<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ליגת המגרש</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Karantina:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { background: #0c0c0a; font-family: 'Heebo', sans-serif; color: #f5f5f4; min-height: 100vh; }
  .font-display { font-family: 'Karantina', serif; }
  .font-num { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.05em; }
  .pitch-bg {
    background-image:
      linear-gradient(0deg, transparent 49.5%, rgba(163,230,53,0.04) 49.5%, rgba(163,230,53,0.04) 50.5%, transparent 50.5%),
      linear-gradient(90deg, transparent 49.5%, rgba(163,230,53,0.04) 49.5%, rgba(163,230,53,0.04) 50.5%, transparent 50.5%);
    background-size: 80px 80px;
  }
  @keyframes slideDown { from { transform: translate(-50%, -100%); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
  .toast { animation: slideDown 0.3s ease-out; }
  input, select, textarea { font-family: inherit; }
  .cal-scroll::-webkit-scrollbar { height: 8px; }
  .cal-scroll::-webkit-scrollbar-track { background: #1c1917; }
  .cal-scroll::-webkit-scrollbar-thumb { background: #44403c; border-radius: 4px; }
</style>
</head>
<body class="pitch-bg">
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect } = React;

  const SUPABASE_URL = 'https://xbrrxdxxfsmxllgtnoep.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_P_DvnAuIfEx8SKuhR4tgGA_K4k5nK57';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const DAYS = ['ראשון', 'שני', 'שלישי', 'רביעי', 'חמישי', 'שישי', 'שבת'];
  const HOUR_HEIGHT = 60;

  // Status color mapping
  const STATUS_STYLES = {
    pending: {
      bg: 'bg-blue-500/20',
      hover: 'hover:bg-blue-500/30',
      border: 'border-blue-400',
      text: 'text-blue-200',
      label: 'ממתין לאישור',
      dot: 'bg-blue-400'
    },
    approved: {
      bg: 'bg-lime-400/20',
      hover: 'hover:bg-lime-400/30',
      border: 'border-lime-400',
      text: 'text-lime-200',
      label: 'מאושר',
      dot: 'bg-lime-400'
    },
    rejected: {
      bg: 'bg-red-500/20',
      hover: 'hover:bg-red-500/30',
      border: 'border-red-500',
      text: 'text-red-200',
      label: 'נדחה',
      dot: 'bg-red-500'
    }
  };

  function formatPhoneForWhatsApp(phone) {
    let digits = (phone || '').replace(/\D/g, '');
    if (digits.startsWith('0')) digits = '972' + digits.slice(1);
    if (!digits.startsWith('972') && digits.length >= 9) digits = '972' + digits;
    return digits;
  }

  function parseTime(t) {
    if (!t) return 0;
    const [h, m] = t.split(':').map(Number);
    return h + (m || 0) / 60;
  }

  function fmtTimeRange(start, end) {
    if (!start) return '';
    if (!end) return start;
    return `${start} - ${end}`;
  }

  // Get the display info for an event based on its status
  function getEventDisplay(ev) {
    if (ev.status === 'approved') {
      return {
        day: ev.scheduled_day,
        start: ev.scheduled_time,
        end: ev.scheduled_end_time,
        field: ev.scheduled_field
      };
    }
    return {
      day: ev.preferred_day,
      start: ev.preferred_time,
      end: ev.preferred_end_time,
      field: ev.preferred_field
    };
  }

  function buildWhatsAppApproveLink(reg) {
    const phone = formatPhoneForWhatsApp(reg.phone);
    const fieldLine = reg.scheduled_field ? `\n📍 ${reg.scheduled_field}` : '';
    const msg = `שלום ${reg.captain_name}! 👋\n\nההרשמה של *${reg.team_name}* אושרה ⚽\n\n📅 יום ${reg.scheduled_day}\n🕐 ${fmtTimeRange(reg.scheduled_time, reg.scheduled_end_time)}${fieldLine}\n\nנתראה במגרש!`;
    return `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
  }

  function buildEmailApproveLink(reg) {
    const subject = `אישור הרשמה - ${reg.team_name}`;
    const fieldLine = reg.scheduled_field ? `\n• מגרש: ${reg.scheduled_field}` : '';
    const body = `שלום ${reg.captain_name},\n\nההרשמה של ${reg.team_name} אושרה!\n\nפרטי המשחק:\n• יום ${reg.scheduled_day}\n• שעות: ${fmtTimeRange(reg.scheduled_time, reg.scheduled_end_time)}${fieldLine}\n\nנתראה במגרש!`;
    return `mailto:${reg.email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  }

  function buildWhatsAppRejectLink(reg) {
    const phone = formatPhoneForWhatsApp(reg.phone);
    const msg = `שלום ${reg.captain_name}, לצערנו לא נוכל לקלוט את ${reg.team_name} בזמן המבוקש. נשמח לתאם זמן אחר 🙏`;
    return `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
  }

  function layoutDayEvents(events) {
    const sorted = [...events].sort((a, b) => {
      const da = getEventDisplay(a);
      const db = getEventDisplay(b);
      return parseTime(da.start) - parseTime(db.start);
    });
    const groups = [];
    let currentGroup = [];
    let currentEnd = 0;
    for (const ev of sorted) {
      const d = getEventDisplay(ev);
      const start = parseTime(d.start);
      if (start >= currentEnd && currentGroup.length > 0) {
        groups.push(currentGroup);
        currentGroup = [];
      }
      currentGroup.push(ev);
      currentEnd = Math.max(currentEnd, parseTime(d.end || d.start));
    }
    if (currentGroup.length) groups.push(currentGroup);
    const result = [];
    for (const group of groups) {
      const total = group.length;
      group.forEach((ev, i) => result.push({ ...ev, _col: i, _total: total }));
    }
    return result;
  }

  function App() {
    const [view, setView] = useState('home');
    const [user, setUser] = useState(null);
    const [registrations, setRegistrations] = useState([]);
    const [loading, setLoading] = useState(true);
    const [toast, setToast] = useState(null);
    const [approvalDialog, setApprovalDialog] = useState(null);
    const [eventDetail, setEventDetail] = useState(null);

    useEffect(() => {
      supabase.auth.getSession().then(({ data }) => {
        setUser(data.session?.user || null);
      });
      const { data: sub } = supabase.auth.onAuthStateChange((_event, session) => {
        setUser(session?.user || null);
      });
      return () => sub.subscription.unsubscribe();
    }, []);

    // Load data + subscribe to realtime updates
    useEffect(() => {
      loadData();
      const channel = supabase
        .channel('registrations-realtime')
        .on('postgres_changes',
          { event: '*', schema: 'public', table: 'registrations' },
          () => { loadData(); }
        )
        .subscribe();
      return () => { supabase.removeChannel(channel); };
    }, []);

    async function loadData() {
      const { data, error } = await supabase
        .from('registrations')
        .select('*')
        .order('created_at', { ascending: true });
      if (error) {
        showToast('שגיאה בטעינת הנתונים', 'error');
      } else {
        setRegistrations(data || []);
      }
      setLoading(false);
    }

    const showToast = (msg, type = 'success') => {
      setToast({ msg, type });
      setTimeout(() => setToast(null), 3500);
    };

    const pending = registrations.filter(r => r.status === 'pending');
    const approved = registrations.filter(r => r.status === 'approved');
    const rejected = registrations.filter(r => r.status === 'rejected');

    async function submitRegistration(form) {
      const { error } = await supabase.from('registrations').insert([{
        team_name: form.team_name,
        captain_name: form.captain_name,
        email: form.email,
        phone: form.phone,
        preferred_day: form.preferred_day,
        preferred_time: form.preferred_time,
        preferred_end_time: form.preferred_end_time,
        preferred_field: form.preferred_field || null,
        players: form.players ? parseInt(form.players) : null,
        notes: form.notes || null,
        status: 'pending'
      }]);
      if (error) {
        showToast('שגיאה בשליחה: ' + error.message, 'error');
        return false;
      }
      showToast('ההרשמה נשלחה לאישור! נחזור אליך בקרוב 🎉');
      setView('home');
      return true;
    }

    async function approveRegistration(reg, day, startTime, endTime, field) {
      const { error } = await supabase
        .from('registrations')
        .update({
          status: 'approved',
          scheduled_day: day,
          scheduled_time: startTime,
          scheduled_end_time: endTime,
          scheduled_field: field || null,
          approved_at: new Date().toISOString()
        })
        .eq('id', reg.id);
      if (error) { showToast('שגיאה: ' + error.message, 'error'); return; }
      setApprovalDialog(null);
      setEventDetail(null);
      showToast(`${reg.team_name} אושרה! 🎉`);
    }

    async function rejectRegistration(reg) {
      if (!confirm(`לדחות את ההרשמה של ${reg.team_name}?`)) return;
      const { error } = await supabase.from('registrations').update({ status: 'rejected' }).eq('id', reg.id);
      if (error) { showToast('שגיאה: ' + error.message, 'error'); return; }
      setEventDetail(null);
      showToast('ההרשמה נדחתה');
    }

    async function deleteRegistration(id) {
      if (!confirm('למחוק לצמיתות? פעולה זו אינה הפיכה')) return;
      const { error } = await supabase.from('registrations').delete().eq('id', id);
      if (error) { showToast('שגיאה: ' + error.message, 'error'); return; }
      setEventDetail(null);
      showToast('נמחק');
    }

    async function login(email, password) {
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) return error.message;
      setView('admin');
      return null;
    }

    async function logout() {
      await supabase.auth.signOut();
      setView('home');
      showToast('יצאת בהצלחה');
    }

    if (loading && registrations.length === 0) {
      return <div className="min-h-screen flex items-center justify-center"><div className="text-lime-400 text-xl animate-pulse">טוען...</div></div>;
    }

    return (
      <div className="min-h-screen relative">
        {toast && (
          <div className={`toast fixed top-4 left-1/2 -translate-x-1/2 z-50 px-4 py-3 rounded-lg shadow-2xl font-bold max-w-sm text-center ${toast.type === 'error' ? 'bg-red-500 text-white' : 'bg-lime-400 text-stone-950'}`}>
            {toast.msg}
          </div>
        )}

        {approvalDialog && <ApprovalDialog reg={approvalDialog} onClose={() => setApprovalDialog(null)} onApprove={approveRegistration} />}
        {eventDetail && <EventDetailDialog
          event={eventDetail}
          onClose={() => setEventDetail(null)}
          isAdmin={!!user}
          onApprove={() => { setEventDetail(null); setApprovalDialog(eventDetail); }}
          onReject={() => rejectRegistration(eventDetail)}
          onDelete={() => deleteRegistration(eventDetail.id)}
          onEdit={() => { setEventDetail(null); setApprovalDialog(eventDetail); }}
        />}

        <Header user={user} onHome={() => setView('home')} onAdmin={() => setView(user ? 'admin' : 'adminLogin')} onLogout={logout} />

        <main className="max-w-5xl mx-auto">
          {view === 'home' && <Home registrations={registrations} onRegister={() => setView('register')} onEventClick={setEventDetail} />}
          {view === 'register' && <RegisterForm onBack={() => setView('home')} onSubmit={submitRegistration} />}
          {view === 'adminLogin' && <AdminLogin onBack={() => setView('home')} onLogin={login} />}
          {view === 'admin' && user && <AdminPanel
            pending={pending}
            approved={approved}
            rejected={rejected}
            onApprove={(r) => setApprovalDialog(r)}
            onReject={rejectRegistration}
            onDelete={deleteRegistration}
            onEdit={(r) => setApprovalDialog(r)}
          />}
        </main>

        <footer className="border-t border-stone-800 mt-16 py-6 text-center text-xs text-stone-600">⚽ ליגת המגרש</footer>
      </div>
    );
  }

  function Header({ user, onHome, onAdmin, onLogout }) {
    return (
      <header className="border-b border-lime-500/10">
        <div className="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
          <div onClick={onHome} className="cursor-pointer flex items-center gap-2">
            <div className="w-9 h-9 rounded-full bg-lime-400 flex items-center justify-center text-stone-950 text-xl">⚽</div>
            <div>
              <h1 className="text-2xl font-black leading-none font-display text-stone-100">ליגת המגרש</h1>
              <p className="text-[10px] text-lime-400 uppercase tracking-widest">FOOTBALL LEAGUE</p>
            </div>
          </div>
          {user ? (
            <div className="flex items-center gap-3">
              <button onClick={onAdmin} className="text-lime-400 hover:text-lime-300 text-sm font-bold">🛡️ ניהול</button>
              <button onClick={onLogout} className="text-stone-400 hover:text-red-400 text-sm">🚪</button>
            </div>
          ) : (
            <button onClick={onAdmin} className="text-stone-500 hover:text-lime-400 text-sm">🛡️ מנהלים</button>
          )}
        </div>
      </header>
    );
  }

  function Home({ registrations, onRegister, onEventClick }) {
    return (
      <div className="px-4 py-8">
        <div className="text-center py-8 mb-8 border-y border-lime-500/10">
          <div className="text-xs text-lime-400 uppercase tracking-[0.3em] mb-2">לוח שבועי רשמי</div>
          <h1 className="text-6xl md:text-8xl font-black text-stone-100 leading-[0.9] font-display">המגרש שלנו</h1>
          <h2 className="text-6xl md:text-8xl font-black text-lime-400 leading-[0.9] font-display">המשחק שלך</h2>
          <p className="text-stone-400 mt-4 max-w-md mx-auto">הירשם, קבל אישור ממנהל המגרש, ותפוס את הזמן שלך השבוע</p>
          <button onClick={onRegister} className="mt-6 inline-flex items-center gap-2 bg-lime-400 hover:bg-lime-300 text-stone-950 font-black px-8 py-4 rounded-md uppercase tracking-wider shadow-xl shadow-lime-400/20 active:scale-95 transition-all font-display text-2xl">
            ➕ הירשם עכשיו
          </button>
        </div>

        <div>
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-3xl font-black text-stone-100 font-display">הלוח השבועי</h2>
            <div className="text-xs text-stone-500 uppercase tracking-wider">{registrations.length} בקשות</div>
          </div>
          <p className="text-stone-500 text-xs mb-3">💡 גלול אופקית לראות את כל הימים. לחץ על משחק לפרטים.</p>
          <CalendarGrid registrations={registrations} onEventClick={onEventClick} />
          <Legend />
        </div>
      </div>
    );
  }

  function Legend() {
    return (
      <div className="mt-4 bg-stone-900/40 border border-stone-800 rounded-lg p-3">
        <div className="text-xs text-stone-500 uppercase tracking-wider mb-2">מקרא</div>
        <div className="flex flex-wrap gap-4 text-sm">
          {['pending', 'approved', 'rejected'].map(s => {
            const st = STATUS_STYLES[s];
            return (
              <div key={s} className="flex items-center gap-2">
                <div className={`w-4 h-4 rounded ${st.bg} border-r-[3px] ${st.border}`} />
                <span className="text-stone-300">{st.label}</span>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  function CalendarGrid({ registrations, onEventClick }) {
    // Filter to events that have day+time (preferred or scheduled depending on status)
    const visible = registrations.filter(r => {
      const d = getEventDisplay(r);
      return d.day && d.start;
    });

    if (visible.length === 0) {
      return (
        <div className="text-center py-16 border-2 border-dashed border-stone-800 rounded-lg">
          <div className="text-5xl mb-3">📅</div>
          <p className="text-stone-500">אין משחקים מתוזמנים השבוע</p>
          <p className="text-stone-600 text-sm mt-1">היה הראשון להירשם!</p>
        </div>
      );
    }

    let minHour = 23, maxHour = 0;
    visible.forEach(g => {
      const d = getEventDisplay(g);
      const start = parseTime(d.start);
      const end = d.end ? parseTime(d.end) : (start + 1);
      if (start < minHour) minHour = Math.floor(start);
      if (end > maxHour) maxHour = Math.ceil(end);
    });
    minHour = Math.max(0, minHour - 1);
    maxHour = Math.min(24, maxHour + 1);
    if (minHour >= maxHour) { minHour = 8; maxHour = 22; }

    const hours = [];
    for (let h = minHour; h < maxHour; h++) hours.push(h);
    const totalHeight = hours.length * HOUR_HEIGHT;

    const eventsByDay = {};
    DAYS.forEach(day => {
      eventsByDay[day] = layoutDayEvents(visible.filter(g => {
        const d = getEventDisplay(g);
        return d.day === day && d.start;
      }));
    });

    return (
      <div className="cal-scroll overflow-x-auto bg-stone-900/30 border border-stone-800 rounded-lg">
        <div className="min-w-[700px]">
          <div className="grid sticky top-0 bg-stone-950 z-20 border-b border-stone-800" style={{ gridTemplateColumns: 'repeat(7, 1fr) 55px' }}>
            {DAYS.map(d => (
              <div key={d} className="text-center py-3 border-r border-stone-800 first:border-r-0">
                <div className="font-display text-2xl font-black text-lime-400 leading-none">{d}</div>
              </div>
            ))}
            <div className="bg-stone-950"></div>
          </div>

          <div className="grid relative" style={{ gridTemplateColumns: 'repeat(7, 1fr) 55px', height: totalHeight }}>
            {DAYS.map(day => (
              <div key={day} className="relative border-r border-stone-800 first:border-r-0">
                {hours.map((h, i) => (
                  <div key={h} className="absolute w-full border-t border-stone-900" style={{ top: i * HOUR_HEIGHT, height: HOUR_HEIGHT }} />
                ))}
                {eventsByDay[day].map(ev => {
                  const d = getEventDisplay(ev);
                  const start = parseTime(d.start);
                  const end = d.end ? parseTime(d.end) : (start + 1);
                  const top = (start - minHour) * HOUR_HEIGHT;
                  const height = Math.max((end - start) * HOUR_HEIGHT, 28);
                  const widthPct = 100 / ev._total;
                  const leftPct = ev._col * widthPct;
                  const st = STATUS_STYLES[ev.status] || STATUS_STYLES.pending;
                  return (
                    <button
                      key={ev.id}
                      onClick={() => onEventClick(ev)}
                      className={`absolute ${st.bg} ${st.hover} border-r-[3px] ${st.border} rounded p-1 text-xs text-right overflow-hidden transition-colors cursor-pointer`}
                      style={{
                        top: top + 1,
                        height: height - 2,
                        right: `calc(${leftPct}% + 2px)`,
                        width: `calc(${widthPct}% - 4px)`
                      }}
                    >
                      <div className="font-bold text-stone-100 truncate leading-tight">{ev.team_name}</div>
                      {d.field && <div className={`${st.text} truncate text-[10px] leading-tight`}>📍 {d.field}</div>}
                      <div className="text-stone-300 text-[10px] leading-tight font-num" dir="ltr">
                        {d.start}{d.end ? `-${d.end}` : ''}
                      </div>
                    </button>
                  );
                })}
              </div>
            ))}

            <div className="bg-stone-950/80 border-r border-stone-800">
              {hours.map((h) => (
                <div key={h} className="text-stone-500 text-xs text-center font-num" style={{ height: HOUR_HEIGHT, paddingTop: 2 }}>
                  {String(h).padStart(2, '0')}:00
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    );
  }

  function EventDetailDialog({ event, onClose, isAdmin, onApprove, onReject, onDelete, onEdit }) {
    const d = getEventDisplay(event);
    const st = STATUS_STYLES[event.status] || STATUS_STYLES.pending;
    return (
      <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-end md:items-center justify-center p-4" onClick={onClose}>
        <div className="bg-stone-900 border border-lime-500/30 rounded-t-2xl md:rounded-2xl w-full max-w-md p-6 max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
          <div className="flex items-start justify-between mb-3">
            <div>
              <div className={`inline-flex items-center gap-1.5 ${st.bg} ${st.text} text-xs font-bold px-2 py-1 rounded mb-2`}>
                <div className={`w-2 h-2 rounded-full ${st.dot}`} /> {st.label}
              </div>
              <h3 className="text-3xl font-black text-stone-100 font-display leading-none">{event.team_name}</h3>
              <p className="text-stone-400 text-sm mt-1">{event.captain_name}</p>
            </div>
            <button onClick={onClose} className="text-stone-500 text-2xl leading-none">×</button>
          </div>
          <div className="space-y-2 text-stone-200">
            <div>📅 <span className="font-bold">יום {d.day}</span></div>
            <div className="font-num" dir="ltr">🕐 {fmtTimeRange(d.start, d.end)}</div>
            {d.field && <div>📍 {d.field}</div>}
            {event.players && <div>👥 {event.players} שחקנים</div>}
            {event.notes && <div className="bg-stone-950/60 rounded p-2 text-stone-400 italic text-sm mt-2">"{event.notes}"</div>}
          </div>
          {isAdmin && (
            <div className="border-t border-stone-800 mt-5 pt-4">
              <div className="text-xs text-stone-500 uppercase tracking-wider mb-2">פרטי קשר</div>
              <div className="text-sm text-stone-300">📧 <span dir="ltr">{event.email}</span></div>
              <div className="text-sm text-stone-300 mb-3">📱 <span dir="ltr">{event.phone}</span></div>

              {event.status === 'approved' && (
                <div className="flex gap-2 mb-3">
                  <a href={buildWhatsAppApproveLink(event)} target="_blank" rel="noopener" className="flex-1 bg-green-600 text-white font-bold py-2 rounded text-sm text-center">💬 וואטסאפ</a>
                  <a href={buildEmailApproveLink(event)} className="flex-1 bg-stone-700 text-stone-100 font-bold py-2 rounded text-sm text-center">📧 מייל</a>
                </div>
              )}

              <div className="flex gap-2 flex-wrap">
                {event.status === 'pending' && (
                  <>
                    <button onClick={onApprove} className="flex-1 bg-lime-400 text-stone-950 font-bold py-2 rounded text-sm">✓ אשר</button>
                    <button onClick={onReject} className="flex-1 bg-red-900/40 border border-red-500/30 text-red-300 font-bold py-2 rounded text-sm">✕ דחה</button>
                  </>
                )}
                {event.status === 'approved' && (
                  <>
                    <button onClick={onEdit} className="flex-1 bg-stone-700 text-stone-100 font-bold py-2 rounded text-sm">✏️ ערוך</button>
                    <button onClick={onReject} className="flex-1 bg-red-900/40 border border-red-500/30 text-red-300 font-bold py-2 rounded text-sm">✕ בטל</button>
                  </>
                )}
                {event.status === 'rejected' && (
                  <button onClick={onApprove} className="flex-1 bg-lime-400 text-stone-950 font-bold py-2 rounded text-sm">↩️ אשר בכל זאת</button>
                )}
                <button onClick={onDelete} className="bg-red-950/40 border border-red-500/40 text-red-300 px-3 py-2 rounded text-sm" title="מחק לצמיתות">🗑️</button>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  function RegisterForm({ onBack, onSubmit }) {
    const [form, setForm] = useState({
      team_name: '', captain_name: '', email: '', phone: '',
      preferred_day: '', preferred_time: '', preferred_end_time: '',
      preferred_field: '', players: '', notes: ''
    });
    const [errors, setErrors] = useState({});
    const [submitting, setSubmitting] = useState(false);

    const submit = async () => {
      const errs = {};
      if (!form.team_name.trim()) errs.team_name = 'חובה';
      if (!form.captain_name.trim()) errs.captain_name = 'חובה';
      if (!form.email.trim() || !form.email.includes('@')) errs.email = 'מייל לא תקין';
      if (!form.phone.trim() || form.phone.replace(/\D/g, '').length < 9) errs.phone = 'טלפון לא תקין';
      if (!form.preferred_day) errs.preferred_day = 'חובה';
      if (!form.preferred_time) errs.preferred_time = 'חובה';
      if (!form.preferred_end_time) errs.preferred_end_time = 'חובה';
      if (form.preferred_time && form.preferred_end_time && form.preferred_end_time <= form.preferred_time) {
        errs.preferred_end_time = 'שעת סיום חייבת להיות אחרי ההתחלה';
      }
      setErrors(errs);
      if (Object.keys(errs).length) return;
      setSubmitting(true);
      await onSubmit(form);
      setSubmitting(false);
    };

    const inputCls = "w-full bg-stone-900/60 border-2 border-lime-500/20 focus:border-lime-400 text-stone-100 px-4 py-3 rounded-md outline-none transition-colors text-base placeholder-stone-500";
    const labelCls = "block text-lime-400 mb-2 font-bold text-sm tracking-wide uppercase";

    return (
      <div className="max-w-xl mx-auto px-4 py-8">
        <button onClick={onBack} className="text-stone-400 mb-6 hover:text-lime-400">← חזרה</button>
        <h1 className="text-5xl md:text-6xl font-black mb-2 font-display text-lime-400">הרשמת קבוצה</h1>
        <p className="text-stone-400 mb-8">מלא את הפרטים ומנהל המגרש יאשר אותך</p>

        <div className="space-y-5">
          <div>
            <label className={labelCls}>שם הקבוצה</label>
            <input className={inputCls} value={form.team_name} onChange={e => setForm({...form, team_name: e.target.value})} placeholder="הברזילאים" />
            {errors.team_name && <p className="text-red-400 text-sm mt-1">{errors.team_name}</p>}
          </div>
          <div>
            <label className={labelCls}>שם הקפטן</label>
            <input className={inputCls} value={form.captain_name} onChange={e => setForm({...form, captain_name: e.target.value})} placeholder="ישראל ישראלי" />
            {errors.captain_name && <p className="text-red-400 text-sm mt-1">{errors.captain_name}</p>}
          </div>
          <div>
            <label className={labelCls}>📧 מייל</label>
            <input type="email" className={inputCls} value={form.email} onChange={e => setForm({...form, email: e.target.value})} placeholder="captain@team.com" dir="ltr" />
            {errors.email && <p className="text-red-400 text-sm mt-1">{errors.email}</p>}
          </div>
          <div>
            <label className={labelCls}>📱 וואטסאפ</label>
            <input type="tel" className={inputCls} value={form.phone} onChange={e => setForm({...form, phone: e.target.value})} placeholder="050-1234567" dir="ltr" />
            {errors.phone && <p className="text-red-400 text-sm mt-1">{errors.phone}</p>}
          </div>
          <div>
            <label className={labelCls}>📍 מגרש מבוקש</label>
            <input className={inputCls} value={form.preferred_field} onChange={e => setForm({...form, preferred_field: e.target.value})} placeholder="מגרש א' / דשא / וכו'" />
          </div>
          <div>
            <label className={labelCls}>יום מועדף</label>
            <select className={inputCls} value={form.preferred_day} onChange={e => setForm({...form, preferred_day: e.target.value})}>
              <option value="">בחר יום</option>
              {DAYS.map(d => <option key={d} value={d}>{d}</option>)}
            </select>
            {errors.preferred_day && <p className="text-red-400 text-sm mt-1">{errors.preferred_day}</p>}
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className={labelCls}>משעה</label>
              <input type="time" className={inputCls} value={form.preferred_time} onChange={e => setForm({...form, preferred_time: e.target.value})} dir="ltr" />
              {errors.preferred_time && <p className="text-red-400 text-sm mt-1">{errors.preferred_time}</p>}
            </div>
            <div>
              <label className={labelCls}>עד שעה</label>
              <input type="time" className={inputCls} value={form.preferred_end_time} onChange={e => setForm({...form, preferred_end_time: e.target.value})} dir="ltr" />
              {errors.preferred_end_time && <p className="text-red-400 text-sm mt-1">{errors.preferred_end_time}</p>}
            </div>
          </div>
          <div>
            <label className={labelCls}>מספר שחקנים (אופציונלי)</label>
            <input type="number" className={inputCls} value={form.players} onChange={e => setForm({...form, players: e.target.value})} placeholder="11" />
          </div>
          <div>
            <label className={labelCls}>הערות (אופציונלי)</label>
            <textarea className={inputCls} value={form.notes} onChange={e => setForm({...form, notes: e.target.value})} rows={3} placeholder="משהו שכדאי שנדע..." />
          </div>
          <button onClick={submit} disabled={submitting} className="w-full bg-lime-400 hover:bg-lime-300 text-stone-950 font-black py-4 rounded-md text-lg uppercase tracking-wider transition-all shadow-lg shadow-lime-400/30 active:scale-[0.98] font-display disabled:opacity-50">
            {submitting ? 'שולח...' : 'שלח הרשמה ⚽'}
          </button>
        </div>
      </div>
    );
  }

  function AdminLogin({ onBack, onLogin }) {
    const [email, setEmail] = useState('');
    const [password, setPassword] = useState('');
    const [error, setError] = useState('');
    const [loading, setLoading] = useState(false);

    const handleLogin = async () => {
      if (!email || !password) { setError('מלא את כל השדות'); return; }
      setLoading(true); setError('');
      const err = await onLogin(email, password);
      if (err) setError('פרטי התחברות שגויים');
      setLoading(false);
    };

    return (
      <div className="max-w-sm mx-auto px-4 py-12">
        <button onClick={onBack} className="text-stone-400 mb-6 hover:text-lime-400">← חזרה</button>
        <div className="bg-stone-900/60 border border-lime-500/20 rounded-lg p-6">
          <div className="text-5xl mb-3">🛡️</div>
          <h2 className="text-3xl font-black text-stone-100 mb-2 font-display">כניסת מנהלים</h2>
          <p className="text-stone-400 text-sm mb-5">הזן מייל וסיסמה כדי לאשר הרשמות</p>
          <input type="email" className="w-full bg-stone-950 border-2 border-lime-500/20 focus:border-lime-400 text-stone-100 px-4 py-3 rounded outline-none mb-3" placeholder="מייל" value={email} onChange={e => { setEmail(e.target.value); setError(''); }} dir="ltr" />
          <input type="password" className="w-full bg-stone-950 border-2 border-lime-500/20 focus:border-lime-400 text-stone-100 px-4 py-3 rounded outline-none mb-3" placeholder="סיסמה" value={password} onChange={e => { setPassword(e.target.value); setError(''); }} onKeyDown={e => e.key === 'Enter' && handleLogin()} dir="ltr" />
          {error && <p className="text-red-400 text-sm mb-3">{error}</p>}
          <button onClick={handleLogin} disabled={loading} className="w-full bg-lime-400 text-stone-950 font-black py-3 rounded uppercase tracking-wider font-display disabled:opacity-50">
            {loading ? 'מתחבר...' : 'כניסה'}
          </button>
        </div>
      </div>
    );
  }

  function AdminPanel({ pending, approved, rejected, onApprove, onReject, onDelete, onEdit }) {
    return (
      <div className="px-4 py-8">
        <h1 className="text-5xl font-black text-stone-100 mb-1 font-display">פאנל ניהול</h1>
        <p className="text-stone-500 mb-6 text-sm">צפה ונהל את כל הבקשות במקום אחד</p>

        {/* Dashboard summary */}
        <div className="grid grid-cols-3 gap-3 mb-8">
          {[
            { count: pending.length, label: 'ממתינות', style: STATUS_STYLES.pending },
            { count: approved.length, label: 'מאושרות', style: STATUS_STYLES.approved },
            { count: rejected.length, label: 'נדחו', style: STATUS_STYLES.rejected }
          ].map(s => (
            <div key={s.label} className={`${s.style.bg} border ${s.style.border} rounded-lg p-3 text-center`}>
              <div className={`text-3xl font-black ${s.style.text} font-display leading-none`}>{s.count}</div>
              <div className="text-xs text-stone-400 mt-1">{s.label}</div>
            </div>
          ))}
        </div>

        <Section title="ממתינות לאישור" items={pending} status="pending">
          {pending.map(reg => (
            <PendingCard key={reg.id} reg={reg} onApprove={onApprove} onReject={onReject} />
          ))}
        </Section>

        <Section title="משחקים מאושרים" items={approved} status="approved">
          {approved.map(g => (
            <ApprovedCard key={g.id} g={g} onEdit={onEdit} onReject={onReject} onDelete={onDelete} />
          ))}
        </Section>

        <Section title="נדחו" items={rejected} status="rejected">
          {rejected.map(r => (
            <RejectedCard key={r.id} r={r} onApprove={onApprove} onDelete={onDelete} />
          ))}
        </Section>
      </div>
    );
  }

  function Section({ title, items, status, children }) {
    const [open, setOpen] = useState(status !== 'rejected'); // rejected starts collapsed
    const st = STATUS_STYLES[status];
    return (
      <div className="mb-6">
        <button onClick={() => setOpen(!open)} className="w-full flex items-center justify-between mb-3 group">
          <div className="flex items-center gap-3">
            <h2 className="text-2xl font-black text-stone-100 font-display group-hover:text-lime-400 transition-colors">{title}</h2>
            <span className={`${st.bg} ${st.text} px-2.5 py-0.5 rounded-full text-sm font-black`}>{items.length}</span>
          </div>
          <span className="text-stone-500">{open ? '▲' : '▼'}</span>
        </button>
        {open && (
          items.length === 0 ? (
            <p className="text-stone-500 text-center py-6 border-2 border-dashed border-stone-800 rounded text-sm">אין כרגע</p>
          ) : (
            <div className="space-y-3">{children}</div>
          )
        )}
      </div>
    );
  }

  function PendingCard({ reg, onApprove, onReject }) {
    return (
      <div className="bg-blue-950/20 border border-blue-500/30 rounded-lg p-4">
        <div className="flex items-start justify-between mb-3">
          <div>
            <h3 className="text-xl font-black text-stone-100">{reg.team_name}</h3>
            <p className="text-stone-400 text-sm">{reg.captain_name}</p>
          </div>
          <span className="text-xs text-blue-300 bg-blue-950/50 px-2 py-1 rounded">ממתינה</span>
        </div>
        <div className="text-sm text-stone-300 space-y-1 mb-3">
          <div>📧 <span dir="ltr">{reg.email}</span></div>
          <div>📱 <span dir="ltr">{reg.phone}</span></div>
          <div>🕐 מבקש: יום {reg.preferred_day} <span dir="ltr" className="font-num">{fmtTimeRange(reg.preferred_time, reg.preferred_end_time)}</span></div>
          {reg.preferred_field && <div>📍 {reg.preferred_field}</div>}
          {reg.players && <div>👥 {reg.players} שחקנים</div>}
          {reg.notes && <div className="bg-stone-900/60 rounded p-2 mt-2 text-stone-400 italic">"{reg.notes}"</div>}
        </div>
        <div className="flex gap-2">
          <button onClick={() => onApprove(reg)} className="flex-1 bg-lime-400 hover:bg-lime-300 text-stone-950 font-bold py-2 rounded active:scale-95 transition-all">✓ אשר</button>
          <a href={buildWhatsAppRejectLink(reg)} target="_blank" rel="noopener" className="bg-stone-800 hover:bg-stone-700 text-stone-300 px-3 py-2 rounded text-sm flex items-center" title="שלח הודעה">💬</a>
          <button onClick={() => onReject(reg)} className="bg-red-900/40 hover:bg-red-900/60 border border-red-500/30 text-red-300 px-3 py-2 rounded">✕</button>
        </div>
      </div>
    );
  }

  function ApprovedCard({ g, onEdit, onReject, onDelete }) {
    return (
      <div className="bg-stone-900/60 border-r-4 border-lime-400 rounded-lg p-4">
        <div className="flex items-start justify-between mb-2">
          <div>
            <h3 className="text-lg font-black text-stone-100">{g.team_name}</h3>
            <p className="text-lime-400 text-sm font-bold">
              יום {g.scheduled_day} • <span dir="ltr" className="font-num">{fmtTimeRange(g.scheduled_time, g.scheduled_end_time)}</span>
            </p>
            {g.scheduled_field && <p className="text-stone-400 text-sm">📍 {g.scheduled_field}</p>}
          </div>
          <div className="flex gap-1">
            <button onClick={() => onEdit(g)} className="text-stone-500 hover:text-lime-400 px-2 text-lg" title="ערוך">✏️</button>
            <button onClick={() => onReject(g)} className="text-stone-500 hover:text-red-400 px-2 text-lg" title="בטל">✕</button>
            <button onClick={() => onDelete(g.id)} className="text-stone-600 hover:text-red-400 px-2 text-lg" title="מחק לצמיתות">🗑️</button>
          </div>
        </div>
        <div className="flex gap-2 mt-3">
          <a href={buildWhatsAppApproveLink(g)} target="_blank" rel="noopener" className="flex-1 bg-green-600 hover:bg-green-500 text-white font-bold py-2 rounded text-sm text-center">💬 וואטסאפ</a>
          <a href={buildEmailApproveLink(g)} className="flex-1 bg-stone-700 hover:bg-stone-600 text-stone-100 font-bold py-2 rounded text-sm text-center">📧 מייל</a>
        </div>
      </div>
    );
  }

  function RejectedCard({ r, onApprove, onDelete }) {
    return (
      <div className="bg-red-950/20 border border-red-500/30 rounded-lg p-4">
        <div className="flex items-start justify-between mb-2">
          <div>
            <h3 className="text-lg font-black text-stone-100">{r.team_name}</h3>
            <p className="text-stone-400 text-sm">{r.captain_name} • <span dir="ltr">{r.phone}</span></p>
            <p className="text-red-300/80 text-sm mt-1">
              ביקש: יום {r.preferred_day} <span dir="ltr" className="font-num">{fmtTimeRange(r.preferred_time, r.preferred_end_time)}</span>
            </p>
          </div>
          <div className="flex gap-1">
            <button onClick={() => onApprove(r)} className="text-lime-400 hover:text-lime-300 px-2 text-lg" title="אשר בכל זאת">↩️</button>
            <button onClick={() => onDelete(r.id)} className="text-stone-600 hover:text-red-400 px-2 text-lg" title="מחק לצמיתות">🗑️</button>
          </div>
        </div>
      </div>
    );
  }

  function ApprovalDialog({ reg, onClose, onApprove }) {
    const isEdit = reg.status === 'approved';
    const [day, setDay] = useState((isEdit ? reg.scheduled_day : reg.preferred_day) || '');
    const [startTime, setStartTime] = useState((isEdit ? reg.scheduled_time : reg.preferred_time) || '');
    const [endTime, setEndTime] = useState((isEdit ? reg.scheduled_end_time : reg.preferred_end_time) || '');
    const [field, setField] = useState((isEdit ? reg.scheduled_field : reg.preferred_field) || '');

    return (
      <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-end md:items-center justify-center p-4">
        <div className="bg-stone-900 border border-lime-500/30 rounded-t-2xl md:rounded-2xl w-full max-w-md p-6 max-h-[90vh] overflow-y-auto">
          <h3 className="text-2xl font-black text-lime-400 mb-1 font-display">{isEdit ? 'עריכה: ' : 'אישור: '}{reg.team_name}</h3>
          <p className="text-stone-400 text-sm mb-5">קבע את היום, השעות והמגרש</p>

          <label className="block text-lime-400 mb-2 font-bold text-sm uppercase">יום</label>
          <select className="w-full bg-stone-950 border-2 border-lime-500/20 focus:border-lime-400 text-stone-100 px-4 py-3 rounded outline-none mb-4" value={day} onChange={e => setDay(e.target.value)}>
            <option value="">בחר יום</option>
            {DAYS.map(d => <option key={d} value={d}>{d}</option>)}
          </select>

          <div className="grid grid-cols-2 gap-3 mb-4">
            <div>
              <label className="block text-lime-400 mb-2 font-bold text-sm uppercase">משעה</label>
              <input type="time" className="w-full bg-stone-950 border-2 border-lime-500/20 focus:border-lime-400 text-stone-100 px-4 py-3 rounded outline-none" value={startTime} onChange={e => setStartTime(e.target.value)} dir="ltr" />
            </div>
            <div>
              <label className="block text-lime-400 mb-2 font-bold text-sm uppercase">עד שעה</label>
              <input type="time" className="w-full bg-stone-950 border-2 border-lime-500/20 focus:border-lime-400 text-stone-100 px-4 py-3 rounded outline-none" value={endTime} onChange={e => setEndTime(e.target.value)} dir="ltr" />
            </div>
          </div>

          <label className="block text-lime-400 mb-2 font-bold text-sm uppercase">📍 מגרש</label>
          <input className="w-full bg-stone-950 border-2 border-lime-500/20 focus:border-lime-400 text-stone-100 px-4 py-3 rounded outline-none mb-6" value={field} onChange={e => setField(e.target.value)} placeholder="מגרש א' / מגרש דשא" />

          <div className="flex gap-2">
            <button onClick={onClose} className="flex-1 bg-stone-800 text-stone-300 font-bold py-3 rounded">ביטול</button>
            <button onClick={() => {
              if (!day || !startTime || !endTime) { alert('בחר יום ושעות'); return; }
              if (endTime <= startTime) { alert('שעת סיום חייבת להיות אחרי ההתחלה'); return; }
              onApprove(reg, day, startTime, endTime, field);
            }} className="flex-1 bg-lime-400 text-stone-950 font-black py-3 rounded">
              {isEdit ? 'שמור ✓' : 'אשר ✓'}
            </button>
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
