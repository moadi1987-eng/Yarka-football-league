<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  body { background: #0c0c0a; font-family: 'Heebo', sans-serif; color: #f5f5f4; min-height: 100vh; }
  .font-display { font-family: 'Karantina', serif; }

<body class="pitch-bg">
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useMemo, useRef } = React;

  const SUPABASE_URL = 'https://xbrrxdxxfsmxllgtnoep.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_P_DvnAuIfEx8SKuhR4tgGA_K4k5nK57';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const DAYS = ['ראשון', 'שני', 'שלישי', 'רביעי', 'חמישי', 'שישי', 'שבת'];
  const HOUR_HEIGHT = 60;

  // Available slots config
  const SLOT_DURATION_HOURS = 2;
  const DAY_START = 8;
  const DAY_END = 22;
  const SLOT_ADVANCE = 1; // increment by 1 hour for more options

  const STATUS_STYLES = {
    pending:  { bg: 'bg-blue-500/20', hover: 'hover:bg-blue-500/30', border: 'border-blue-400',  text: 'text-blue-200',  label: 'ממתין לאישור', dot: 'bg-blue-400' },
    approved: { bg: 'bg-lime-400/20', hover: 'hover:bg-lime-400/30', border: 'border-lime-400',  text: 'text-lime-200',  label: 'מאושר',         dot: 'bg-lime-400' },
    rejected: { bg: 'bg-red-500/20',  hover: 'hover:bg-red-500/30',  border: 'border-red-500',   text: 'text-red-200',   label: 'נדחה',          dot: 'bg-red-500' },
    archived: { bg: 'bg-stone-700/20',hover: 'hover:bg-stone-700/30',border: 'border-stone-500', text: 'text-stone-300', label: 'ארכיון',         dot: 'bg-stone-500' }
  };

  const MEMBER_STATUS_STYLES = {
    pending:  { bg: 'bg-amber-500/20', border: 'border-amber-500', text: 'text-amber-200', label: 'ממתין' },
    approved: { bg: 'bg-lime-400/20',  border: 'border-lime-400',  text: 'text-lime-200',  label: 'מאושר' },
    blocked:  { bg: 'bg-red-500/20',   border: 'border-red-500',   text: 'text-red-200',   label: 'חסום' }
  };

  function normalizePhone(phone) {
    // Canonical form: digits only, prefix 0 (Israeli)
    let d = (phone || '').replace(/\D/g, '');
    if (d.startsWith('972')) d = '0' + d.slice(3);
    return d;
  }

  function formatPhoneForWhatsApp(phone) {
    let digits = (phone || '').replace(/\D/g, '');
    if (digits.startsWith('0')) digits = '972' + digits.slice(1);
    if (!digits.startsWith('972') && digits.length >= 9) digits = '972' + digits;
    return digits;
  }

  function parseTime(t) {
    if (!t) return 0;
    const [h, m] = t.split(':').map(Number);
    return h + (m || 0) / 60;
  }

  function formatHour(h) {
    return `${String(h).padStart(2, '0')}:00`;
  }

  function fmtTimeRange(start, end) {
    if (!start) return '';
    if (!end) return start;
    return `${start} - ${end}`;
  }

  function getEventDisplay(ev) {
    if (ev.status === 'approved') {
      return { day: ev.scheduled_day, start: ev.scheduled_time, end: ev.scheduled_end_time, field: ev.scheduled_field };
    }
    return { day: ev.preferred_day, start: ev.preferred_time, end: ev.preferred_end_time, field: ev.preferred_field };
  }

  // Find available 2-hour slots on a given day
  function findAvailableSlots(day, registrations, excludeId = null) {
    if (!day) return [];
    const dayEvents = registrations
      .filter(e => e.status === 'approved' && e.scheduled_day === day && e.scheduled_time && e.id !== excludeId)
      .map(e => ({
        start: parseTime(e.scheduled_time),
        end: parseTime(e.scheduled_end_time || e.scheduled_time)
      }));

    const slots = [];
    for (let h = DAY_START; h + SLOT_DURATION_HOURS <= DAY_END; h += SLOT_ADVANCE) {
      const start = h;
      const end = h + SLOT_DURATION_HOURS;
      const conflict = dayEvents.some(e => start < e.end && end > e.start);
      if (!conflict) {
        slots.push({ start: formatHour(start), end: formatHour(end) });
      }
    }
    return slots;
  }

  // Check for conflict with approved games (returns conflicting event or null)
  function findConflict(day, startTime, endTime, registrations, excludeId = null) {
    if (!day || !startTime || !endTime) return null;
    const start = parseTime(startTime);
    const end = parseTime(endTime);
    if (start >= end) return null;
    for (const ev of registrations) {
      if (ev.status !== 'approved') continue;
      if (excludeId && ev.id === excludeId) continue;
      if (ev.scheduled_day !== day || !ev.scheduled_time) continue;
      const evStart = parseTime(ev.scheduled_time);
      const evEnd = parseTime(ev.scheduled_end_time || ev.scheduled_time);
      if (start < evEnd && end > evStart) return ev;
    }
    return null;
  }

  // Emojis generated at runtime from code points (most robust approach for URL encoding)
  const E_WAVE  = String.fromCodePoint(0x1F44B);
  const E_BALL  = String.fromCodePoint(0x26BD);
  const E_CAL   = String.fromCodePoint(0x1F4C5);
  const E_CLOCK = String.fromCodePoint(0x1F550);
  const E_PIN   = String.fromCodePoint(0x1F4CD);
  const E_PRAY  = String.fromCodePoint(0x1F64F);

  function buildApproveMessageText(reg) {
    const fieldLine = reg.scheduled_field ? ('\n' + E_PIN + ' ' + reg.scheduled_field) : '';
    return 'שלום ' + reg.captain_name + '! ' + E_WAVE + '\n\nההרשמה של *' + reg.team_name + '* אושרה ' + E_BALL + '\n\n' + E_CAL + ' יום ' + reg.scheduled_day + '\n' + E_CLOCK + ' ' + fmtTimeRange(reg.scheduled_time, reg.scheduled_end_time) + fieldLine + '\n\nנתראה במגרש!';
  }

  function buildWhatsAppApproveLink(reg) {
    if (!reg.phone) return null;
    const phone = formatPhoneForWhatsApp(reg.phone);
    return 'https://wa.me/' + phone + '?text=' + encodeURIComponent(buildApproveMessageText(reg));
  }

  function buildEmailApproveLink(reg) {
    if (!reg.email) return null;
    const subject = `אישור הרשמה - ${reg.team_name}`;
    const fieldLine = reg.scheduled_field ? `\n• מגרש: ${reg.scheduled_field}` : '';
    const body = `שלום ${reg.captain_name},\n\nההרשמה של ${reg.team_name} אושרה!\n\nפרטי המשחק:\n• יום ${reg.scheduled_day}\n• שעות: ${fmtTimeRange(reg.scheduled_time, reg.scheduled_end_time)}${fieldLine}\n\nנתראה במגרש!`;
    return `mailto:${reg.email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  }

  function buildWhatsAppRejectLink(reg) {
    if (!reg.phone) return null;
    const phone = formatPhoneForWhatsApp(reg.phone);
    const msg = 'שלום ' + reg.captain_name + ', לצערנו לא נוכל לקלוט את ' + reg.team_name + ' בזמן המבוקש. נשמח לתאם זמן אחר ' + E_PRAY;
    return 'https://wa.me/' + phone + '?text=' + encodeURIComponent(msg);
  }

  function buildWhatsAppMemberApproveLink(member) {
    if (!member.phone) return null;
    const phone = formatPhoneForWhatsApp(member.phone);
    const msg = 'שלום ' + member.full_name + '! ' + E_WAVE + '\nאושרת כמשתמש בליגת המגרש ' + E_BALL + '\nעכשיו אתה יכול להזמין משחקים דרך האתר.\n\nבהצלחה!';
    return 'https://wa.me/' + phone + '?text=' + encodeURIComponent(msg);
  }

  function layoutDayEvents(events) {
    const sorted = [...events].sort((a, b) => parseTime(getEventDisplay(a).start) - parseTime(getEventDisplay(b).start));
    const groups = [];
    let currentGroup = [];
    let currentEnd = 0;
    for (const ev of sorted) {
      const d = getEventDisplay(ev);
      const start = parseTime(d.start);
      if (start >= currentEnd && currentGroup.length > 0) { groups.push(currentGroup); currentGroup = []; }
      currentGroup.push(ev);
      currentEnd = Math.max(currentEnd, parseTime(d.end || d.start));
    }
    if (currentGroup.length) groups.push(currentGroup);
    const result = [];
    for (const group of groups) {
      const total = group.length;
      group.forEach((ev, i) => result.push({ ...ev, _col: i, _total: total }));
    }
    return result;
  }

  // ============================================
  // SHARED COMPONENTS
  // ============================================

  function AvailableSlotChips({ day, registrations, excludeId, onSelectSlot, compact }) {
    const slots = useMemo(() => findAvailableSlots(day, registrations, excludeId), [day, registrations, excludeId]);
    if (!day) return null;
    return (
      <div className={`bg-lime-950/30 border border-lime-500/20 rounded-md ${compact ? 'p-2' : 'p-3'}`}>
        <div className="text-xs text-lime-400 mb-2 font-bold uppercase tracking-wider">💡 שעות פנויות ביום {day}</div>
        {slots.length === 0 ? (
          <p className="text-xs text-amber-400">⚠️ אין שעות פנויות של שעתיים ביום זה</p>
        ) : (
          <div className="flex flex-wrap gap-1.5">
            {slots.map((s, i) => (
              <button
                key={i}
                type="button"
                onClick={() => onSelectSlot(s.start, s.end)}
                className="bg-lime-400/15 hover:bg-lime-400/25 active:bg-lime-400/35 border border-lime-400/40 text-lime-200 text-sm font-bold px-2.5 py-1 rounded font-num transition-colors"
                dir="ltr"
              >
                {s.start}-{s.end}
              </button>
            ))}
          </div>
        )}
      </div>
    );
  }

  function ConflictPopup({ conflict, day, registrations, excludeId, onClose, onSelectSlot }) {
    const slots = useMemo(() => findAvailableSlots(day, registrations, excludeId), [day, registrations, excludeId]);
    return (
      <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-[60] flex items-end md:items-center justify-center p-4" onClick={onClose}>
        <div className="bg-stone-900 border border-amber-500/30 rounded-t-2xl md:rounded-2xl w-full max-w-md p-6" onClick={e => e.stopPropagation()}>
          <div className="flex items-start gap-3 mb-4">
            <div className="text-3xl">⚠️</div>
            <div className="flex-1">
              <h3 className="text-2xl font-black text-amber-400 font-display leading-tight">השעות תפוסות</h3>
              <p className="text-stone-300 text-sm mt-2">
                ביום {day} כבר משחקת <strong className="text-stone-100">{conflict.team_name}</strong>
              </p>
              <p className="text-amber-300 text-sm font-num mt-1" dir="ltr">
                🕐 {fmtTimeRange(conflict.scheduled_time, conflict.scheduled_end_time)}
                {conflict.scheduled_field ? ` • 📍 ${conflict.scheduled_field}` : ''}
              </p>
            </div>
          </div>

          <div className="border-t border-stone-800 pt-4">
            <div className="text-xs text-lime-400 uppercase tracking-wider mb-3 font-bold">💡 בחר מתוך השעות הפנויות</div>
            {slots.length === 0 ? (
              <p className="text-stone-500 text-sm py-3 text-center">אין שעות פנויות של שעתיים ביום זה - נסה יום אחר</p>
            ) : (
              <div className="flex flex-wrap gap-2 mb-3">
                {slots.map((s, i) => (
                  <button
                    key={i}
                    onClick={() => onSelectSlot(s.start, s.end)}
                    className="bg-lime-400/20 hover:bg-lime-400/30 active:bg-lime-400/40 border border-lime-400/40 text-lime-200 text-sm font-bold px-3 py-2 rounded font-num transition-all"
                    dir="ltr"
                  >
                    {s.start}-{s.end}
                  </button>
                ))}
              </div>
            )}
          </div>

          <button onClick={onClose} className="w-full bg-stone-800 text-stone-300 font-bold py-3 rounded mt-4">סגור</button>
        </div>
      </div>
    );
  }

  // ============================================
  // MAIN APP
  // ============================================

  function NotifyDialog({ reg, onClose }) {
    const waLink = buildWhatsAppApproveLink(reg);
    const emailLink = buildEmailApproveLink(reg);
    const messageText = buildApproveMessageText(reg);
    const [copied, setCopied] = useState(false);

    const copyMessage = async () => {
      try {
        await navigator.clipboard.writeText(messageText);
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      } catch (e) {
        // Fallback for older browsers
        const ta = document.createElement('textarea');
        ta.value = messageText;
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); setCopied(true); setTimeout(() => setCopied(false), 2000); } catch (_) {}
        document.body.removeChild(ta);
      }
    };

    return (
      <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-[60] flex items-end md:items-center justify-center p-4" onClick={onClose}>
        <div className="bg-stone-900 border border-lime-500/30 rounded-t-2xl md:rounded-2xl w-full max-w-md p-6" onClick={e => e.stopPropagation()}>
          <div className="text-center mb-5">
            <div className="text-5xl mb-2">✅</div>
            <h3 className="text-3xl font-black text-lime-400 font-display">אושרה!</h3>
            <p className="text-stone-300 text-sm mt-1">שלח אישור ל-<strong>{reg.team_name}</strong>?</p>
          </div>
          <div className="space-y-2">
            {waLink && (
              <a href={waLink} target="_blank" rel="noopener" onClick={onClose}
                 className="flex items-center justify-center gap-2 w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded text-base">
                💬 שלח בוואטסאפ
              </a>
            )}
            <button onClick={copyMessage}
                    className="flex items-center justify-center gap-2 w-full bg-stone-700 hover:bg-stone-600 text-stone-100 font-bold py-3 rounded text-base">
              {copied ? '✓ הועתק! פתח וואטסאפ והדבק' : '📋 העתק הודעה (גיבוי לאמוג\'ים)'}
            </button>
            {emailLink && (
              <a href={emailLink} onClick={onClose}
                 className="flex items-center justify-center gap-2 w-full bg-stone-700 hover:bg-stone-600 text-stone-100 font-bold py-3 rounded text-base">
                📧 שלח במייל
              </a>
            )}
            <button onClick={onClose} className="w-full bg-stone-800/60 text-stone-400 py-3 rounded text-sm">
              מאוחר יותר
            </button>
          </div>
        </div>
      </div>
    );
  }

  function RejectDialog({ reg, onClose, onReject }) {
    const waLink = buildWhatsAppRejectLink(reg);
    return (
      <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-[60] flex items-end md:items-center justify-center p-4" onClick={onClose}>
        <div className="bg-stone-900 border border-red-500/30 rounded-t-2xl md:rounded-2xl w-full max-w-md p-6" onClick={e => e.stopPropagation()}>
          <div className="text-center mb-5">
            <div className="text-4xl mb-2">⚠️</div>
            <h3 className="text-2xl font-black text-red-400 font-display">לדחות את {reg.team_name}?</h3>
            <p className="text-stone-400 text-sm mt-1">בחר איך לעדכן את הקבוצה</p>
          </div>
          <div className="space-y-2">
            {waLink && (
              <button onClick={() => onReject(reg, true)}
                      className="w-full bg-red-700 hover:bg-red-600 text-white font-bold py-3 rounded">
                ❌ דחה ושלח הסבר בוואטסאפ
              </button>
            )}
            <button onClick={() => onReject(reg, false)}
                    className="w-full bg-red-900/40 border border-red-500/30 text-red-300 font-bold py-3 rounded">
              דחה (בלי הודעה)
            </button>
            <button onClick={onClose} className="w-full bg-stone-800/60 text-stone-400 py-3 rounded text-sm">
              ביטול
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ==========================================
  // MEMBER FLOW VIEWS
  // ==========================================

  function PhoneCheckView({ onBack, onCheck }) {
    const [phone, setPhone] = useState('');
    const [loading, setLoading] = useState(false);
    const [error, setError] = useState('');

    const submit = async () => {
      if (!phone.trim() || phone.replace(/\D/g, '').length < 9) {
        setError('מספר טלפון לא תקין');
        return;
      }
      setLoading(true); setError('');
      await onCheck(phone);
      setLoading(false);
    };

    return (
      <div className="max-w-md mx-auto px-4 py-12">
        <button onClick={onBack} className="text-stone-400 mb-6 hover:text-lime-400">← חזרה</button>
        <div className="text-center mb-8">
          <div className="text-5xl mb-3">📱</div>
          <h1 className="text-4xl font-black text-lime-400 font-display">הזמנת משחק</h1>
          <p className="text-stone-400 text-sm mt-2">הזן את מספר הוואטסאפ שלך כדי להמשיך</p>
        </div>
        <input type="tel" inputMode="tel" className="w-full bg-stone-900/60 border-2 border-lime-500/20 focus:border-lime-400 text-stone-100 px-4 py-3 rounded-md outline-none text-lg placeholder-stone-500 mb-3" placeholder="050-1234567" value={phone} onChange={e => { setPhone(e.target.value); setError(''); }} dir="ltr" onKeyDown={e => e.key === 'Enter' && submit()} />
        {error && <p className="text-red-400 text-sm mb-3">{error}</p>}
        <button onClick={submit} disabled={loading} className="w-full bg-lime-400 hover:bg-lime-300 text-stone-950 font-black py-4 rounded-md text-lg uppercase tracking-wider font-display disabled:opacity-50">
          {loading ? 'בודק...' : 'המשך'}
        </button>
        <p className="text-stone-500 text-xs mt-4 text-center">משתמש חדש? תוכל להירשם אחרי לחיצה על "המשך"</p>
      </div>
    );
  }

  function MemberRegisterView({ prefilledPhone, onBack, onSubmit }) {
    const [form, setForm] = useState({ full_name: '', phone: prefilledPhone || '', email: '' });
    const [errors, setErrors] = useState({});
    const [submitting, setSubmitting] = useState(false);

    const submit = async () => {
      const errs = {};
      if (!form.full_name.trim()) errs.full_name = 'חובה';
      if (!form.phone.trim() || form.phone.replace(/\D/g, '').length < 9) errs.phone = 'טלפון לא תקין';
      if (form.email.trim() && !form.email.includes('@')) errs.email = 'מייל לא תקין';
      setErrors(errs);
      if (Object.keys(errs).length) return;
      setSubmitting(true);
      const ok = await onSubmit(form);
      if (!ok) setSubmitting(false);
    };

    const inputCls = "w-full bg-stone-900/60 border-2 border-lime-500/20 focus:border-lime-400 text-stone-100 px-4 py-3 rounded-md outline-none text-base placeholder-stone-500";
    const labelCls = "block text-lime-400 mb-2 font-bold text-sm tracking-wide uppercase";

    return (
      <div className="max-w-xl mx-auto px-4 py-8">
        <button onClick={onBack} className="text-stone-400 mb-6 hover:text-lime-400">← חזרה</button>
        <div className="text-center mb-6">
          <div className="text-4xl mb-2">👤</div>
          <h1 className="text-4xl font-black text-lime-400 font-display">הרשמת משתמש</h1>
          <p className="text-stone-400 text-sm mt-2">פעם ראשונה? מלא פרטים ומנהל המגרש יאשר אותך</p>
        </div>
        <div className="space-y-5">
          <div>
            <label className={labelCls}>שם מלא *</label>
            <input className={inputCls} value={form.full_name} onChange={e => setForm({...form, full_name: e.target.value})} placeholder="ישראל ישראלי" />
            {errors.full_name && <p className="text-red-400 text-sm mt-1">{errors.full_name}</p>}
          </div>
          <div>
            <label className={labelCls}>וואטסאפ *</label>
            <input type="tel" inputMode="tel" className={inputCls} value={form.phone} onChange={e => setForm({...form, phone: e.target.value})} placeholder="050-1234567" dir="ltr" />
            {errors.phone && <p className="text-red-400 text-sm mt-1">{errors.phone}</p>}
          </div>
          <div>
            <label className={labelCls}>מייל (אופציונלי)</label>
            <input type="email" inputMode="email" className={inputCls} value={form.email} onChange={e => setForm({...form, email: e.target.value})} placeholder="you@example.com" dir="ltr" />
            {errors.email && <p className="text-red-400 text-sm mt-1">{errors.email}</p>}
          </div>
          <button onClick={submit} disabled={submitting} className="w-full bg-lime-400 hover:bg-lime-300 text-stone-950 font-black py-4 rounded-md text-lg uppercase tracking-wider font-display disabled:opacity-50">
            {submitting ? 'שולח...' : 'שלח לאישור'}
          </button>
        </div>
      </div>
    );
  }

  function AwaitingApprovalView({ status, onBack }) {
    const blocked = status === 'blocked';
    return (
      <div className="max-w-md mx-auto px-4 py-12 text-center">
        <button onClick={onBack} className="text-stone-400 mb-6 hover:text-lime-400 block mx-auto">← חזרה</button>
        <div className="text-6xl mb-4">{blocked ? '🚫' : '⏳'}</div>
        <h1 className={`text-4xl font-black font-display mb-3 ${blocked ? 'text-red-400' : 'text-amber-400'}`}>
          {blocked ? 'הגישה נחסמה' : 'ממתין לאישור'}
        </h1>
        <p className="text-stone-400 leading-relaxed">
          {blocked ? 'החשבון שלך נחסם. פנה למנהל המגרש.' : 'ההרשמה שלך נמצאת בבדיקה. נחזור אליך בקרוב עם אישור בוואטסאפ.'}
        </p>
      </div>
    );
  }

  function App() {
    const [view, setView] = useState('home');
    const [user, setUser] = useState(null);
    const [registrations, setRegistrations] = useState([]);
    const [members, setMembers] = useState([]);
    const [settings, setSettings] = useState({ teams: [], field_name: '', open_registration: false });
    const [currentMember, setCurrentMember] = useState(null);
    const [pendingPhone, setPendingPhone] = useState('');
    const [awaitingStatus, setAwaitingStatus] = useState('pending');
    const [loading, setLoading] = useState(true);
    const [toast, setToast] = useState(null);
    const [approvalDialog, setApprovalDialog] = useState(null);
    const [eventDetail, setEventDetail] = useState(null);
    const [notifyDialog, setNotifyDialog] = useState(null);
    const [rejectDialog, setRejectDialog] = useState(null);
    const [autoApprove, setAutoApprove] = useState(() => {
      try { return localStorage.getItem('auto_approve') === 'true'; } catch (e) { return false; }
    });
    const autoApprovingRef = useRef(false);

    const toggleAutoApprove = () => {
      setAutoApprove(prev => {
        const next = !prev;
        try { localStorage.setItem('auto_approve', String(next)); } catch (e) {}
        showToast(next ? '🟢 אישור אוטומטי הופעל' : '⚫ אישור אוטומטי כובה');
        return next;
      });
    };

    useEffect(() => {
      supabase.auth.getSession().then(({ data }) => { setUser(data.session?.user || null); });
      const { data: sub } = supabase.auth.onAuthStateChange((_event, session) => { setUser(session?.user || null); });
      return () => sub.subscription.unsubscribe();
    }, []);

    // Back button handling: intercept and navigate inside the app instead of exiting
    useEffect(() => {
      if (view !== 'home') {
        window.history.pushState({ appNav: true, view }, '');
      }
    }, [view]);

    useEffect(() => {
      const onPopState = () => {
        // Any back-press while inside the app → go to home (or out of booking flow)
        setCurrentMember(null);
        setView('home');
      };
      window.addEventListener('popstate', onPopState);
      return () => window.removeEventListener('popstate', onPopState);
    }, []);

    useEffect(() => {
      loadData();
      loadMembers();
      loadSettings();
      const regChannel = supabase.channel('reg-rt').on('postgres_changes', { event: '*', schema: 'public', table: 'registrations' }, () => loadData()).subscribe();
      const memChannel = supabase.channel('mem-rt').on('postgres_changes', { event: '*', schema: 'public', table: 'members' }, () => loadMembers()).subscribe();
      const setChannel = supabase.channel('set-rt').on('postgres_changes', { event: '*', schema: 'public', table: 'app_settings' }, () => loadSettings()).subscribe();
      return () => { supabase.removeChannel(regChannel); supabase.removeChannel(memChannel); supabase.removeChannel(setChannel); };
    }, []);

    async function loadData() {
      const { data, error } = await supabase.from('registrations').select('*').order('created_at', { ascending: true });
      if (error) showToast('שגיאה בטעינת הנתונים', 'error');
      else { setRegistrations(data || []); maybeAutoArchive(data || []); }
      setLoading(false);
    }

    async function loadMembers() {
      const { data, error } = await supabase.from('members').select('*').order('created_at', { ascending: false });
      if (!error) setMembers(data || []);
    }

    async function loadSettings() {
      const { data, error } = await supabase.from('app_settings').select('*');
      if (!error && data) {
        const next = { teams: [], field_name: '', open_registration: false };
        for (const row of data) {
          if (row.key === 'teams' && Array.isArray(row.value)) next.teams = row.value;
          else if (row.key === 'field_name') next.field_name = typeof row.value === 'string' ? row.value : '';
          else if (row.key === 'open_registration') next.open_registration = !!row.value;
        }
        setSettings(next);
      }
    }

    async function saveSetting(key, value) {
      const { error } = await supabase.from('app_settings').upsert({ key, value, updated_at: new Date().toISOString() }, { onConflict: 'key' });
      if (error) { showToast('שגיאה: ' + error.message, 'error'); return false; }
      return true;
    }

    async function maybeAutoArchive(regs) {
      // Only logged-in admins can trigger (RLS would block anyway)
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) return;

      // Compute start of current week (Sunday 00:00 local time)
      const now = new Date();
      const thisWeekStart = new Date(now);
      thisWeekStart.setDate(now.getDate() - now.getDay());
      thisWeekStart.setHours(0, 0, 0, 0);

      // Find approved/rejected games from before this week
      const oldGames = regs.filter(r =>
        (r.status === 'approved' || r.status === 'rejected') &&
        r.created_at && new Date(r.created_at) < thisWeekStart
      );

      if (oldGames.length === 0) return;

      const { data: updated, error: updErr } = await supabase
        .from('registrations')
        .update({ status: 'archived' })
        .in('status', ['approved', 'rejected'])
        .lt('created_at', thisWeekStart.toISOString())
        .select();

      if (!updErr && updated && updated.length > 0) {
        showToast(`הלוח אופס: ${updated.length} משחקים עברו לארכיון 🔄`);
      }
    }

    const showToast = (msg, type = 'success') => {
      setToast({ msg, type });
      setTimeout(() => setToast(null), 3500);
    };

    const pending = registrations.filter(r => r.status === 'pending');
    const approved = registrations.filter(r => r.status === 'approved');
    const rejected = registrations.filter(r => r.status === 'rejected');
    const archived = registrations.filter(r => r.status === 'archived');

    async function submitRegistration(form) {
      const m = currentMember;
      const fieldName = settings.field_name || form.preferred_field || null;
      const payload = {
        team_name: form.team_name,
        captain_name: m ? m.full_name : form.captain_name,
        email: m ? (m.email || null) : (form.email || null),
        phone: m ? m.phone : form.phone,
        preferred_day: form.preferred_day,
        preferred_time: form.preferred_time,
        preferred_end_time: form.preferred_end_time,
        preferred_field: fieldName,
        players: form.players ? parseInt(form.players) : null,
        notes: form.notes || null,
        status: 'pending',
        member_id: m ? m.id : null
      };
      const { error } = await supabase.from('registrations').insert([payload]);
      if (error) { showToast('שגיאה בשליחה: ' + error.message, 'error'); return false; }
      showToast('ההרשמה נשלחה לאישור! נחזור אליך בקרוב 🎉');
      setView('home');
      setCurrentMember(null);
      return true;
    }

    async function handlePhoneCheck(phone) {
      const normalized = normalizePhone(phone);
      const match = members.find(m => normalizePhone(m.phone) === normalized);
      if (match) {
        if (match.status === 'approved') {
          setCurrentMember(match);
          setView('booking');
        } else {
          setAwaitingStatus(match.status);
          setView('awaitingApproval');
        }
      } else {
        setPendingPhone(phone);
        setView('memberRegister');
      }
    }

    async function submitMemberRegistration(form) {
      const normalized = normalizePhone(form.phone);
      const existing = members.find(m => normalizePhone(m.phone) === normalized);
      if (existing) {
        showToast('מספר זה כבר רשום במערכת');
        setAwaitingStatus(existing.status);
        setView('awaitingApproval');
        return true;
      }
      const { error } = await supabase.from('members').insert([{
        full_name: form.full_name.trim(),
        phone: normalized,
        email: form.email.trim() || null,
        status: 'pending'
      }]);
      if (error) { showToast('שגיאה: ' + error.message, 'error'); return false; }
      setAwaitingStatus('pending');
      setView('awaitingApproval');
      return true;
    }

    function startBookingFlow() {
      if (settings.open_registration) {
        setCurrentMember(null);
        setView('booking');
      } else {
        setView('phoneCheck');
      }
    }

    async function approveMember(member) {
      const { error } = await supabase.from('members').update({
        status: 'approved', approved_at: new Date().toISOString()
      }).eq('id', member.id);
      if (error) { showToast('שגיאה: ' + error.message, 'error'); return; }
      showToast(`${member.full_name} אושר! 🎉`);
      const link = buildWhatsAppMemberApproveLink(member);
      if (link) window.open(link, '_blank');
    }

    async function blockMember(member) {
      if (!confirm(`לחסום את ${member.full_name}?`)) return;
      const { error } = await supabase.from('members').update({ status: 'blocked' }).eq('id', member.id);
      if (error) { showToast('שגיאה: ' + error.message, 'error'); return; }
      showToast('המשתמש נחסם');
    }

    async function unblockMember(member) {
      const { error } = await supabase.from('members').update({ status: 'approved' }).eq('id', member.id);
      if (error) { showToast('שגיאה: ' + error.message, 'error'); return; }
      showToast('המשתמש הוחזר לפעילות');
    }

    async function deleteMember(member) {
      if (!confirm(`למחוק את ${member.full_name} לצמיתות?`)) return;
      const { error } = await supabase.from('members').delete().eq('id', member.id);
      if (error) { showToast('שגיאה: ' + error.message, 'error'); return; }
      showToast('המשתמש נמחק');
    }

    async function approveRegistration(reg, day, startTime, endTime, field, silent = false) {
      const { error } = await supabase.from('registrations').update({
        status: 'approved', scheduled_day: day, scheduled_time: startTime,
        scheduled_end_time: endTime, scheduled_field: field || null,
        approved_at: new Date().toISOString()
      }).eq('id', reg.id);
      if (error) { showToast('שגיאה: ' + error.message, 'error'); return; }
      setApprovalDialog(null); setEventDetail(null);
      const approvedReg = { ...reg, scheduled_day: day, scheduled_time: startTime, scheduled_end_time: endTime, scheduled_field: field || null };
      if (silent) {
        showToast(`✓ אושרה אוטומטית: ${reg.team_name}`);
      } else {
        showToast(`${reg.team_name} אושרה! 🎉`);
        // Open notify dialog if there's contact info
        if (approvedReg.email || approvedReg.phone) {
          setNotifyDialog(approvedReg);
        }
      }
    }

    // Smart approve: if no conflict, approve directly. If conflict, open dialog.
    async function smartApprove(reg) {
      const conflict = findConflict(reg.preferred_day, reg.preferred_time, reg.preferred_end_time, registrations);
      if (conflict) {
        setEventDetail(null);
        setApprovalDialog(reg);
        return;
      }
      await approveRegistration(reg, reg.preferred_day, reg.preferred_time, reg.preferred_end_time, reg.preferred_field);
    }

    // Auto-approve effect: when toggle is on, approve unconflicted pending registrations
    useEffect(() => {
      if (!user || !autoApprove || pending.length === 0 || autoApprovingRef.current) return;
      const next = pending.find(reg => !findConflict(reg.preferred_day, reg.preferred_time, reg.preferred_end_time, registrations));
      if (!next) return;
      autoApprovingRef.current = true;
      approveRegistration(next, next.preferred_day, next.preferred_time, next.preferred_end_time, next.preferred_field, true)
        .finally(() => { autoApprovingRef.current = false; });
    }, [registrations, autoApprove, user]);

    async function rejectRegistration(reg, notifyViaWhatsApp = false) {
      // Open WhatsApp window synchronously (within click handler) to bypass popup blockers
      let win = null;
      if (notifyViaWhatsApp) {
        const link = buildWhatsAppRejectLink(reg);
        if (link) win = window.open('', '_blank');
      }
      const { error } = await supabase.from('registrations').update({ status: 'rejected' }).eq('id', reg.id);
      if (error) {
        if (win) win.close();
        showToast('שגיאה: ' + error.message, 'error');
        return;
      }
      if (win) {
        const link = buildWhatsAppRejectLink(reg);
        if (link) win.location.href = link;
      }
      setEventDetail(null);
      setRejectDialog(null);
      showToast('ההרשמה נדחתה');
    }

    async function deleteRegistration(id) {
      if (!confirm('למחוק לצמיתות? פעולה זו אינה הפיכה')) return;
      const { error } = await supabase.from('registrations').delete().eq('id', id);
      if (error) { showToast('שגיאה: ' + error.message, 'error'); return; }
      setEventDetail(null);
      showToast('נמחק');
    }

    async function resetWeek() {
      if (!confirm('סיום שבוע: כל המשחקים המאושרים והנדחים יעברו לארכיון. הבקשות הממתינות יישארו. להמשיך?')) return;
      const { error } = await supabase.from('registrations').update({ status: 'archived' }).in('status', ['approved', 'rejected']);
      if (error) { showToast('שגיאה: ' + error.message, 'error'); return; }
      showToast('הלוח אופס - המשחקים בארכיון 🔄');
    }

    async function login(email, password) {
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) return error.message;
      setView('admin'); return null;
    }

    async function logout() {
      await supabase.auth.signOut();
      setView('home');
      showToast('יצאת בהצלחה');
    }

    if (loading && registrations.length === 0) {
      return <div className="min-h-screen flex items-center justify-center"><div className="text-lime-400 text-xl animate-pulse">טוען...</div></div>;
    }

    return (
      <div className="min-h-screen relative">
        {toast && (
          <div className={`toast fixed top-4 left-1/2 -translate-x-1/2 z-50 px-4 py-3 rounded-lg shadow-2xl font-bold max-w-sm text-center ${toast.type === 'error' ? 'bg-red-500 text-white' : 'bg-lime-400 text-stone-950'}`}>
            {toast.msg}
          </div>
        )}

        {approvalDialog && <ApprovalDialog reg={approvalDialog} registrations={registrations} onClose={() => setApprovalDialog(null)} onApprove={approveRegistration} />}
        {notifyDialog && <NotifyDialog reg={notifyDialog} onClose={() => setNotifyDialog(null)} />}
        {rejectDialog && <RejectDialog reg={rejectDialog} onClose={() => setRejectDialog(null)} onReject={rejectRegistration} />}
        {eventDetail && <EventDetailDialog
          event={eventDetail}
          onClose={() => setEventDetail(null)}
          isAdmin={!!user}
          onApprove={() => smartApprove(eventDetail)}
          onReject={() => { setEventDetail(null); setRejectDialog(eventDetail); }}
          onDelete={() => deleteRegistration(eventDetail.id)}
          onEdit={() => { setEventDetail(null); setApprovalDialog(eventDetail); }}
        />}

        <Header user={user} onHome={() => setView('home')} onAdmin={() => setView(user ? 'admin' : 'adminLogin')} onLogout={logout} />

        <main className="max-w-5xl mx-auto">
          {view === 'home' && <Home registrations={registrations} onRegister={startBookingFlow} onEventClick={setEventDetail} />}
          {view === 'phoneCheck' && <PhoneCheckView onBack={() => setView('home')} onCheck={handlePhoneCheck} />}
          {view === 'memberRegister' && <MemberRegisterView prefilledPhone={pendingPhone} onBack={() => setView('phoneCheck')} onSubmit={submitMemberRegistration} />}
          {view === 'awaitingApproval' && <AwaitingApprovalView status={awaitingStatus} onBack={() => setView('home')} />}
          {view === 'booking' && <RegisterForm registrations={registrations} settings={settings} member={currentMember} onBack={() => { setView('home'); setCurrentMember(null); }} onSubmit={submitRegistration} />}
          {view === 'adminLogin' && <AdminLogin onBack={() => setView('home')} onLogin={login} />}
          {view === 'admin' && user && <AdminPanel
            pending={pending} approved={approved} rejected={rejected} archived={archived}
            members={members} settings={settings}
            autoApprove={autoApprove}
            onToggleAutoApprove={toggleAutoApprove}
            onApprove={smartApprove}
            onReject={(r) => setRejectDialog(r)}
            onDelete={deleteRegistration}
            onEdit={(r) => setApprovalDialog(r)}
            onResetWeek={resetWeek}
            onApproveMember={approveMember}
            onBlockMember={blockMember}
            onUnblockMember={unblockMember}
            onDeleteMember={deleteMember}
            onSaveSetting={saveSetting}
          />}
        </main>

        <footer className="border-t border-stone-800 mt-16 py-6 text-center text-xs text-stone-600">⚽ ליגת המגרש</footer>
      </div>
    );
  }

  function Header({ user, onHome, onAdmin, onLogout }) {
    return (
      <header className="border-b border-lime-500/10">
        <div className="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
          <div onClick={onHome} className="cursor-pointer flex items-center gap-2">
            <div className="w-9 h-9 rounded-full bg-lime-400 flex items-center justify-center text-stone-950 text-xl">⚽</div>
            <div>
              <h1 className="text-2xl font-black leading-none font-display text-stone-100">ליגת המגרש</h1>
              <p className="text-[10px] text-lime-400 uppercase tracking-widest">FOOTBALL LEAGUE</p>
            </div>
          </div>
          {user ? (
            <div className="flex items-center gap-3">
              <button onClick={onAdmin} className="text-lime-400 hover:text-lime-300 text-sm font-bold">🛡️ ניהול</button>
              <button onClick={onLogout} className="text-stone-400 hover:text-red-400 text-sm">🚪</button>
            </div>
          ) : (
            <button onClick={onAdmin} className="text-stone-500 hover:text-lime-400 text-sm">🛡️ מנהלים</button>
          )}
        </div>
      </header>
    );
  }

  function Home({ registrations, onRegister, onEventClick }) {
    return (
      <div className="px-4 py-8">
        <div className="text-center py-8 mb-8 border-y border-lime-500/10">
          <div className="text-xs text-lime-400 uppercase tracking-[0.3em] mb-2">לוח שבועי רשמי</div>
          <h1 className="text-6xl md:text-8xl font-black text-stone-100 leading-[0.9] font-display">המגרש שלנו</h1>
          <h2 className="text-6xl md:text-8xl font-black text-lime-400 leading-[0.9] font-display">המשחק שלך</h2>
          <p className="text-stone-400 mt-4 max-w-md mx-auto">הירשם, קבל אישור ממנהל המגרש, ותפוס את הזמן שלך השבוע</p>
          <button onClick={onRegister} className="mt-6 inline-flex items-center gap-2 bg-lime-400 hover:bg-lime-300 text-stone-950 font-black px-8 py-4 rounded-md uppercase tracking-wider shadow-xl shadow-lime-400/20 active:scale-95 transition-all font-display text-2xl">
            ➕ הירשם עכשיו
          </button>
        </div>

        <div>
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-3xl font-black text-stone-100 font-display">הלוח השבועי</h2>
            <div className="text-xs text-stone-500 uppercase tracking-wider">{registrations.length} בקשות</div>
          </div>
          <p className="text-stone-500 text-xs mb-3">💡 גלול אופקית לראות את כל הימים. לחץ על משחק לפרטים.</p>
          <CalendarGrid registrations={registrations} onEventClick={onEventClick} />
          <Legend />
        </div>
      </div>
    );
  }

  function Legend() {
    return (
      <div className="mt-4 bg-stone-900/40 border border-stone-800 rounded-lg p-3">
        <div className="text-xs text-stone-500 uppercase tracking-wider mb-2">מקרא</div>
        <div className="flex flex-wrap gap-4 text-sm">
          {['pending', 'approved', 'rejected'].map(s => {
            const st = STATUS_STYLES[s];
            return (
              <div key={s} className="flex items-center gap-2">
                <div className={`w-4 h-4 rounded ${st.bg} border-r-[3px] ${st.border}`} />
                <span className="text-stone-300">{st.label}</span>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  function CalendarGrid({ registrations, onEventClick }) {
    const [compact, setCompact] = useState(() => {
      try { return localStorage.getItem('cal_compact') === 'true'; } catch (e) { return false; }
    });
    const toggleCompact = () => {
      setCompact(prev => {
        const next = !prev;
        try { localStorage.setItem('cal_compact', String(next)); } catch (e) {}
        return next;
      });
    };

    const hourHeight = compact ? 40 : HOUR_HEIGHT;
    const minWidthCls = compact ? '' : 'min-w-[700px]';
    const dayFontCls = compact ? 'text-lg' : 'text-2xl';
    const dayPaddingCls = compact ? 'py-1.5' : 'py-3';

    const visible = registrations.filter(r => {
      if (r.status === 'archived') return false;
      const d = getEventDisplay(r);
      return d.day && d.start;
    });
    if (visible.length === 0) {
      return (
        <div className="text-center py-16 border-2 border-dashed border-stone-800 rounded-lg">
          <div className="text-5xl mb-3">📅</div>
          <p className="text-stone-500">אין משחקים מתוזמנים השבוע</p>
          <p className="text-stone-600 text-sm mt-1">היה הראשון להירשם!</p>
        </div>
      );
    }

    let minHour = 23, maxHour = 0;
    visible.forEach(g => {
      const d = getEventDisplay(g);
      const start = parseTime(d.start);
      const end = d.end ? parseTime(d.end) : (start + 1);
      if (start < minHour) minHour = Math.floor(start);
      if (end > maxHour) maxHour = Math.ceil(end);
    });
    minHour = Math.max(0, minHour - 1);
    maxHour = Math.min(24, maxHour + 1);
    if (minHour >= maxHour) { minHour = 8; maxHour = 22; }

    const hours = [];
    for (let h = minHour; h < maxHour; h++) hours.push(h);
    const totalHeight = hours.length * hourHeight;

    const eventsByDay = {};
    DAYS.forEach(day => {
      eventsByDay[day] = layoutDayEvents(visible.filter(g => { const d = getEventDisplay(g); return d.day === day && d.start; }));
    });

    return (
      <div>
        <div className="flex justify-end mb-2">
          <button onClick={toggleCompact} className="text-xs text-stone-400 hover:text-lime-400 bg-stone-900/60 border border-stone-700 hover:border-lime-500/30 px-3 py-1.5 rounded flex items-center gap-1.5">
            {compact ? '🔍 הגדל' : '📐 התאם למסך'}
          </button>
        </div>
        <div className={`${compact ? '' : 'cal-scroll overflow-x-auto'} bg-stone-900/30 border border-stone-800 rounded-lg`}>
          <div className={minWidthCls}>
            <div className="grid sticky top-0 bg-stone-950 z-20 border-b border-stone-800" style={{ gridTemplateColumns: compact ? 'repeat(7, 1fr) 38px' : 'repeat(7, 1fr) 55px' }}>
              {DAYS.map(d => (
                <div key={d} className={`text-center ${dayPaddingCls} border-r border-stone-800 first:border-r-0`}>
                  <div className={`font-display ${dayFontCls} font-black text-lime-400 leading-none`}>{d}</div>
                </div>
              ))}
              <div className="bg-stone-950"></div>
            </div>

            <div className="grid relative" style={{ gridTemplateColumns: compact ? 'repeat(7, 1fr) 38px' : 'repeat(7, 1fr) 55px', height: totalHeight }}>
              {DAYS.map(day => (
                <div key={day} className="relative border-r border-stone-800 first:border-r-0">
                  {hours.map((h, i) => (
                    <div key={h} className="absolute w-full border-t border-stone-900" style={{ top: i * hourHeight, height: hourHeight }} />
                  ))}
                  {eventsByDay[day].map(ev => {
                    const d = getEventDisplay(ev);
                    const start = parseTime(d.start);
                    const end = d.end ? parseTime(d.end) : (start + 1);
                    const top = (start - minHour) * hourHeight;
                    const height = Math.max((end - start) * hourHeight, compact ? 22 : 28);
                    const widthPct = 100 / ev._total;
                    const leftPct = ev._col * widthPct;
                    const st = STATUS_STYLES[ev.status] || STATUS_STYLES.pending;
                    return (
                      <button
                        key={ev.id}
                        onClick={() => onEventClick(ev)}
                        className={`absolute ${st.bg} ${st.hover} border-r-[3px] ${st.border} rounded ${compact ? 'p-0.5' : 'p-1'} text-right overflow-hidden transition-colors cursor-pointer`}
                        style={{ top: top + 1, height: height - 2, right: `calc(${leftPct}% + 2px)`, width: `calc(${widthPct}% - 4px)` }}
                      >
                        <div className={`font-bold text-stone-100 truncate leading-tight ${compact ? 'text-[10px]' : 'text-xs'}`}>{ev.team_name}</div>
                        {!compact && d.field && <div className={`${st.text} truncate text-[10px] leading-tight`}>📍 {d.field}</div>}
                        <div className={`text-stone-300 leading-tight font-num ${compact ? 'text-[9px]' : 'text-[10px]'}`} dir="ltr">{d.start}{d.end ? `-${d.end}` : ''}</div>
                      </button>
                    );
                  })}
                </div>
              ))}

              <div className="bg-stone-950/80 border-r border-stone-800">
                {hours.map((h) => (
                  <div key={h} className={`text-stone-500 text-center font-num ${compact ? 'text-[10px]' : 'text-xs'}`} style={{ height: hourHeight, paddingTop: 2 }}>
                    {String(h).padStart(2, '0')}:00
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  function EventDetailDialog({ event, onClose, isAdmin, onApprove, onReject, onDelete, onEdit }) {
    const d = getEventDisplay(event);
    const st = STATUS_STYLES[event.status] || STATUS_STYLES.pending;
    return (
      <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-end md:items-center justify-center p-4" onClick={onClose}>
        <div className="bg-stone-900 border border-lime-500/30 rounded-t-2xl md:rounded-2xl w-full max-w-md p-6 max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
          <div className="flex items-start justify-between mb-3">
            <div>
              <div className={`inline-flex items-center gap-1.5 ${st.bg} ${st.text} text-xs font-bold px-2 py-1 rounded mb-2`}>
                <div className={`w-2 h-2 rounded-full ${st.dot}`} /> {st.label}
              </div>
              <h3 className="text-3xl font-black text-stone-100 font-display leading-none">{event.team_name}</h3>
              <p className="text-stone-400 text-sm mt-1">{event.captain_name}</p>
            </div>
            <button onClick={onClose} className="text-stone-500 text-2xl leading-none">×</button>
          </div>
          <div className="space-y-2 text-stone-200">
            <div>📅 <span className="font-bold">יום {d.day}</span></div>
            <div className="font-num" dir="ltr">🕐 {fmtTimeRange(d.start, d.end)}</div>
            {d.field && <div>📍 {d.field}</div>}
            {event.players && <div>👥 {event.players} שחקנים</div>}
            {event.notes && <div className="bg-stone-950/60 rounded p-2 text-stone-400 italic text-sm mt-2">"{event.notes}"</div>}
          </div>
          {isAdmin && (
            <div className="border-t border-stone-800 mt-5 pt-4">
              {(event.email || event.phone) && (
                <>
                  <div className="text-xs text-stone-500 uppercase tracking-wider mb-2">פרטי קשר</div>
                  {event.email && <div className="text-sm text-stone-300">📧 <span dir="ltr">{event.email}</span></div>}
                  {event.phone && <div className="text-sm text-stone-300 mb-3">📱 <span dir="ltr">{event.phone}</span></div>}
                </>
              )}

              {event.status === 'approved' && (buildWhatsAppApproveLink(event) || buildEmailApproveLink(event)) && (
                <div className="flex gap-2 mb-3">
                  {buildWhatsAppApproveLink(event) && <a href={buildWhatsAppApproveLink(event)} target="_blank" rel="noopener" className="flex-1 bg-green-600 text-white font-bold py-2 rounded text-sm text-center">💬 וואטסאפ</a>}
                  {buildEmailApproveLink(event) && <a href={buildEmailApproveLink(event)} className="flex-1 bg-stone-700 text-stone-100 font-bold py-2 rounded text-sm text-center">📧 מייל</a>}
                </div>
              )}

              <div className="flex gap-2 flex-wrap">
                {event.status === 'pending' && (<>
                  <button onClick={onApprove} className="flex-1 bg-lime-400 text-stone-950 font-bold py-2 rounded text-sm">✓ אשר</button>
                  <button onClick={onReject} className="flex-1 bg-red-900/40 border border-red-500/30 text-red-300 font-bold py-2 rounded text-sm">✕ דחה</button>
                </>)}
                {event.status === 'approved' && (<>
                  <button onClick={onEdit} className="flex-1 bg-stone-700 text-stone-100 font-bold py-2 rounded text-sm">✏️ ערוך</button>
                  <button onClick={onReject} className="flex-1 bg-red-900/40 border border-red-500/30 text-red-300 font-bold py-2 rounded text-sm">✕ בטל</button>
                </>)}
                {event.status === 'rejected' && (
                  <button onClick={onApprove} className="flex-1 bg-lime-400 text-stone-950 font-bold py-2 rounded text-sm">↩️ אשר בכל זאת</button>
                )}
                <button onClick={onDelete} className="bg-red-950/40 border border-red-500/40 text-red-300 px-3 py-2 rounded text-sm" title="מחק לצמיתות">🗑️</button>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  function RegisterForm({ registrations, settings, member, onBack, onSubmit }) {
    const teams = (settings && settings.teams) || [];
    const fieldName = (settings && settings.field_name) || '';
    const hasMember = !!member;

    const [form, setForm] = useState({
      team_name: teams.length === 1 ? teams[0] : '',
      captain_name: '', email: '', phone: '',
      preferred_day: '', preferred_time: '', preferred_end_time: '',
      preferred_field: fieldName, players: '', notes: ''
    });
    const [errors, setErrors] = useState({});
    const [submitting, setSubmitting] = useState(false);
    const [conflictModal, setConflictModal] = useState(null);

    const liveConflict = useMemo(
      () => findConflict(form.preferred_day, form.preferred_time, form.preferred_end_time, registrations),
      [form.preferred_day, form.preferred_time, form.preferred_end_time, registrations]
    );

    const submit = async () => {
      const errs = {};
      if (!form.team_name || !form.team_name.trim()) errs.team_name = 'חובה';
      if (!hasMember) {
        if (!form.captain_name.trim()) errs.captain_name = 'חובה';
        if (!form.email.trim() && !form.phone.trim()) errs.contact = 'חובה להזין מייל או טלפון';
        if (form.email.trim() && !form.email.includes('@')) errs.email = 'מייל לא תקין';
        if (form.phone.trim() && form.phone.replace(/\D/g, '').length < 9) errs.phone = 'טלפון לא תקין';
      }
      if (!form.preferred_day) errs.preferred_day = 'חובה';
      if (!form.preferred_time) errs.preferred_time = 'חובה';
      if (!form.preferred_end_time) errs.preferred_end_time = 'חובה';
      if (form.preferred_time && form.preferred_end_time && form.preferred_end_time <= form.preferred_time) errs.preferred_end_time = 'שעת סיום חייבת להיות אחרי ההתחלה';
      setErrors(errs);
      if (Object.keys(errs).length) return;

      const conflict = findConflict(form.preferred_day, form.preferred_time, form.preferred_end_time, registrations);
      if (conflict) { setConflictModal({ conflict, day: form.preferred_day }); return; }

      setSubmitting(true);
      await onSubmit(form);
      setSubmitting(false);
    };

    const inputCls = "w-full bg-stone-900/60 border-2 border-lime-500/20 focus:border-lime-400 text-stone-100 px-4 py-3 rounded-md outline-none transition-colors text-base placeholder-stone-500";
    const labelCls = "block text-lime-400 mb-2 font-bold text-sm tracking-wide uppercase";

    return (
      <div className="max-w-xl mx-auto px-4 py-8">
        {conflictModal && <ConflictPopup conflict={conflictModal.conflict} day={conflictModal.day} registrations={registrations} onClose={() => setConflictModal(null)} onSelectSlot={(s, e) => { setForm(f => ({ ...f, preferred_time: s, preferred_end_time: e })); setConflictModal(null); }} />}

        <button onClick={onBack} className="text-stone-400 mb-6 hover:text-lime-400">← חזרה</button>
        <h1 className="text-5xl md:text-6xl font-black mb-2 font-display text-lime-400">
          {hasMember ? 'משחק חדש' : 'הרשמת קבוצה'}
        </h1>
        {hasMember ? (
          <p className="text-stone-400 mb-8">שלום <strong className="text-stone-200">{member.full_name}</strong>! בחר פרטי משחק</p>
        ) : (
          <p className="text-stone-400 mb-8">מלא את הפרטים ומנהל המגרש יאשר אותך</p>
        )}

        <div className="space-y-5">
          <div>
            <label className={labelCls}>שם הקבוצה</label>
            {teams.length > 0 ? (
              <select className={inputCls} value={form.team_name} onChange={e => setForm({...form, team_name: e.target.value})}>
                <option value="">בחר קבוצה</option>
                {teams.map(t => <option key={t} value={t}>{t}</option>)}
              </select>
            ) : (
              <input className={inputCls} value={form.team_name} onChange={e => setForm({...form, team_name: e.target.value})} placeholder="הברזילאים" />
            )}
            {errors.team_name && <p className="text-red-400 text-sm mt-1">{errors.team_name}</p>}
          </div>

          {!hasMember && (
            <>
              <div>
                <label className={labelCls}>שם הקפטן</label>
                <input className={inputCls} value={form.captain_name} onChange={e => setForm({...form, captain_name: e.target.value})} placeholder="ישראל ישראלי" />
                {errors.captain_name && <p className="text-red-400 text-sm mt-1">{errors.captain_name}</p>}
              </div>
              <div className="bg-stone-900/40 border border-stone-800 rounded-md p-3 -mx-1">
                <div className="text-xs text-stone-400 mb-3">📞 פרטי קשר (חובה לפחות אחד)</div>
                <div>
                  <label className={labelCls}>📧 מייל</label>
                  <input type="email" className={inputCls} value={form.email} onChange={e => setForm({...form, email: e.target.value})} placeholder="captain@team.com" dir="ltr" />
                  {errors.email && <p className="text-red-400 text-sm mt-1">{errors.email}</p>}
                </div>
                <div className="mt-4">
                  <label className={labelCls}>📱 וואטסאפ</label>
                  <input type="tel" className={inputCls} value={form.phone} onChange={e => setForm({...form, phone: e.target.value})} placeholder="050-1234567" dir="ltr" />
                  {errors.phone && <p className="text-red-400 text-sm mt-1">{errors.phone}</p>}
                </div>
                {errors.contact && <p className="text-red-400 text-sm mt-3">⚠️ {errors.contact}</p>}
              </div>
            </>
          )}

          {fieldName && (
            <div className="bg-stone-900/40 border border-stone-800 rounded p-3 text-sm">
              <span className="text-stone-500">📍 מגרש: </span>
              <span className="text-stone-200 font-bold">{fieldName}</span>
            </div>
          )}

          <div>
            <label className={labelCls}>יום מועדף</label>
            <select className={inputCls} value={form.preferred_day} onChange={e => setForm({...form, preferred_day: e.target.value})}>
              <option value="">בחר יום</option>
              {DAYS.map(d => <option key={d} value={d}>{d}</option>)}
            </select>
            {errors.preferred_day && <p className="text-red-400 text-sm mt-1">{errors.preferred_day}</p>}
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className={labelCls}>משעה</label>
              <input type="time" className={inputCls} value={form.preferred_time} onChange={e => setForm({...form, preferred_time: e.target.value})} dir="ltr" />
              {errors.preferred_time && <p className="text-red-400 text-sm mt-1">{errors.preferred_time}</p>}
            </div>
            <div>
              <label className={labelCls}>עד שעה</label>
              <input type="time" className={inputCls} value={form.preferred_end_time} onChange={e => setForm({...form, preferred_end_time: e.target.value})} dir="ltr" />
              {errors.preferred_end_time && <p className="text-red-400 text-sm mt-1">{errors.preferred_end_time}</p>}
            </div>
          </div>

          {liveConflict && (
            <div className="bg-amber-950/30 border border-amber-500/30 rounded p-3 text-sm">
              <div className="font-bold text-amber-300 mb-1">⚠️ זמן זה תפוס</div>
              <div className="text-amber-200 text-xs">
                <strong>{liveConflict.team_name}</strong> משחקת ב<span dir="ltr" className="font-num">{fmtTimeRange(liveConflict.scheduled_time, liveConflict.scheduled_end_time)}</span>
              </div>
            </div>
          )}

          {form.preferred_day && (
            <AvailableSlotChips day={form.preferred_day} registrations={registrations} onSelectSlot={(s, e) => setForm(f => ({ ...f, preferred_time: s, preferred_end_time: e }))} />
          )}

          <div>
            <label className={labelCls}>הערות (אופציונלי)</label>
            <textarea className={inputCls} value={form.notes} onChange={e => setForm({...form, notes: e.target.value})} rows={3} placeholder="משהו שכדאי שנדע..." />
          </div>
          <button onClick={submit} disabled={submitting} className="w-full bg-lime-400 hover:bg-lime-300 text-stone-950 font-black py-4 rounded-md text-lg uppercase tracking-wider transition-all shadow-lg shadow-lime-400/30 active:scale-[0.98] font-display disabled:opacity-50">
            {submitting ? 'שולח...' : 'שלח הרשמה ⚽'}
          </button>
        </div>
      </div>
    );
  }

  function AdminLogin({ onBack, onLogin }) {
    const [email, setEmail] = useState('');
    const [password, setPassword] = useState('');
    const [error, setError] = useState('');
    const [loading, setLoading] = useState(false);

    const handleLogin = async () => {
      if (!email || !password) { setError('מלא את כל השדות'); return; }
      setLoading(true); setError('');
      const err = await onLogin(email, password);
      if (err) setError('פרטי התחברות שגויים');
      setLoading(false);
    };

    return (
      <div className="max-w-sm mx-auto px-4 py-12">
        <button onClick={onBack} className="text-stone-400 mb-6 hover:text-lime-400">← חזרה</button>
        <div className="bg-stone-900/60 border border-lime-500/20 rounded-lg p-6">
          <div className="text-5xl mb-3">🛡️</div>
          <h2 className="text-3xl font-black text-stone-100 mb-2 font-display">כניסת מנהלים</h2>
          <p className="text-stone-400 text-sm mb-5">הזן מייל וסיסמה כדי לאשר הרשמות</p>
          <input type="email" className="w-full bg-stone-950 border-2 border-lime-500/20 focus:border-lime-400 text-stone-100 px-4 py-3 rounded outline-none mb-3" placeholder="מייל" value={email} onChange={e => { setEmail(e.target.value); setError(''); }} dir="ltr" />
          <input type="password" className="w-full bg-stone-950 border-2 border-lime-500/20 focus:border-lime-400 text-stone-100 px-4 py-3 rounded outline-none mb-3" placeholder="סיסמה" value={password} onChange={e => { setPassword(e.target.value); setError(''); }} onKeyDown={e => e.key === 'Enter' && handleLogin()} dir="ltr" />
          {error && <p className="text-red-400 text-sm mb-3">{error}</p>}
          <button onClick={handleLogin} disabled={loading} className="w-full bg-lime-400 text-stone-950 font-black py-3 rounded uppercase tracking-wider font-display disabled:opacity-50">
            {loading ? 'מתחבר...' : 'כניסה'}
          </button>
        </div>
      </div>
    );
  }

  function AdminPanel({ pending, approved, rejected, archived, members, settings, autoApprove, onToggleAutoApprove, onApprove, onReject, onDelete, onEdit, onResetWeek, onApproveMember, onBlockMember, onUnblockMember, onDeleteMember, onSaveSetting }) {
    const pendingMembers = members.filter(m => m.status === 'pending');
    const approvedMembers = members.filter(m => m.status === 'approved');
    const blockedMembers = members.filter(m => m.status === 'blocked');

    return (
      <div className="px-4 py-8">
        <h1 className="text-5xl font-black text-stone-100 mb-1 font-display">פאנל ניהול</h1>
        <p className="text-stone-500 mb-6 text-sm">צפה ונהל את כל הבקשות במקום אחד</p>

        <div className="grid grid-cols-3 gap-3 mb-6">
          {[
            { count: pending.length, label: 'ממתינות', style: STATUS_STYLES.pending },
            { count: approved.length, label: 'מאושרות', style: STATUS_STYLES.approved },
            { count: rejected.length, label: 'נדחו', style: STATUS_STYLES.rejected }
          ].map(s => (
            <div key={s.label} className={`${s.style.bg} border ${s.style.border} rounded-lg p-3 text-center`}>
              <div className={`text-3xl font-black ${s.style.text} font-display leading-none`}>{s.count}</div>
              <div className="text-xs text-stone-400 mt-1">{s.label}</div>
            </div>
          ))}
        </div>

        {pendingMembers.length > 0 && (
          <Section title={`👤 משתמשים חדשים ממתינים (${pendingMembers.length})`} items={pendingMembers} status="pending">
            {pendingMembers.map(m => <MemberCard key={m.id} member={m} onApprove={onApproveMember} onBlock={onBlockMember} onDelete={onDeleteMember} />)}
          </Section>
        )}

        <Section title="ממתינות לאישור" items={pending} status="pending">
          {pending.map(reg => <PendingCard key={reg.id} reg={reg} onApprove={onApprove} onReject={onReject} />)}
        </Section>

        <Section title="משחקים מאושרים" items={approved} status="approved">
          {approved.map(g => <ApprovedCard key={g.id} g={g} onEdit={onEdit} onReject={onReject} onDelete={onDelete} />)}
        </Section>

        <Section title="נדחו" items={rejected} status="rejected">
          {rejected.map(r => <RejectedCard key={r.id} r={r} onApprove={onApprove} onDelete={onDelete} />)}
        </Section>

        <Section title={`משתמשים מאושרים (${approvedMembers.length})`} items={approvedMembers} status="approved">
          {approvedMembers.map(m => <MemberCard key={m.id} member={m} onBlock={onBlockMember} onDelete={onDeleteMember} />)}
        </Section>

        {blockedMembers.length > 0 && (
          <Section title={`משתמשים חסומים (${blockedMembers.length})`} items={blockedMembers} status="rejected">
            {blockedMembers.map(m => <MemberCard key={m.id} member={m} onUnblock={onUnblockMember} onDelete={onDeleteMember} />)}
          </Section>
        )}

        <Section title="ארכיון (שבועות קודמים)" items={archived} status="archived">
          {archived.map(a => <ArchivedCard key={a.id} a={a} onDelete={onDelete} />)}
        </Section>

        <SettingsSection settings={settings} onSaveSetting={onSaveSetting} autoApprove={autoApprove} onToggleAutoApprove={onToggleAutoApprove} onResetWeek={onResetWeek} hasGames={approved.length > 0 || rejected.length > 0} />
      </div>
    );
  }

  function MemberCard({ member, onApprove, onBlock, onUnblock, onDelete }) {
    const style = MEMBER_STATUS_STYLES[member.status] || MEMBER_STATUS_STYLES.pending;
    const waLink = 'https://wa.me/' + formatPhoneForWhatsApp(member.phone);
    return (
      <div className={`${style.bg} border ${style.border} rounded-lg p-3`}>
        <div className="flex items-start justify-between gap-2">
          <div className="flex-1 min-w-0">
            <div className={`text-base font-bold ${style.text}`}>{member.full_name}</div>
            <div className="text-stone-400 text-xs mt-0.5" dir="ltr">{member.phone}</div>
            {member.email && <div className="text-stone-500 text-xs" dir="ltr">{member.email}</div>}
          </div>
          <span className={`text-xs px-2 py-0.5 rounded ${style.bg} ${style.text} border ${style.border}`}>{style.label}</span>
        </div>
        <div className="flex gap-2 mt-3 flex-wrap">
          {onApprove && <button onClick={() => onApprove(member)} className="flex-1 bg-lime-500 hover:bg-lime-400 text-stone-950 font-bold py-1.5 px-3 rounded text-sm">✓ אשר</button>}
          {onUnblock && <button onClick={() => onUnblock(member)} className="flex-1 bg-lime-500 hover:bg-lime-400 text-stone-950 font-bold py-1.5 px-3 rounded text-sm">🔓 בטל חסימה</button>}
          <a href={waLink} target="_blank" rel="noopener" className="bg-green-700 hover:bg-green-600 text-white font-bold py-1.5 px-3 rounded text-sm">💬</a>
          {onBlock && member.status === 'approved' && <button onClick={() => onBlock(member)} className="bg-red-900/50 hover:bg-red-800 border border-red-500/50 text-red-300 font-bold py-1.5 px-3 rounded text-sm">🚫</button>}
          {onDelete && <button onClick={() => onDelete(member)} className="bg-stone-800 hover:bg-stone-700 text-stone-400 px-2 rounded text-sm">🗑️</button>}
        </div>
      </div>
    );
  }

  function SettingsSection({ settings, onSaveSetting, autoApprove, onToggleAutoApprove, onResetWeek, hasGames }) {
    const [newTeam, setNewTeam] = useState('');
    const [fieldInput, setFieldInput] = useState(settings.field_name || '');
    const [open, setOpen] = useState(false);

    useEffect(() => { setFieldInput(settings.field_name || ''); }, [settings.field_name]);

    const addTeam = async () => {
      const t = newTeam.trim();
      if (!t) return;
      const teams = settings.teams || [];
      if (teams.includes(t)) return;
      await onSaveSetting('teams', [...teams, t]);
      setNewTeam('');
    };
    const removeTeam = async (t) => {
      if (!confirm(`למחוק את "${t}"?`)) return;
      await onSaveSetting('teams', (settings.teams || []).filter(x => x !== t));
    };
    const saveField = async () => {
      await onSaveSetting('field_name', fieldInput.trim());
    };
    const toggleOpenReg = async () => {
      await onSaveSetting('open_registration', !settings.open_registration);
    };

    return (
      <div className="mt-8">
        <button onClick={() => setOpen(!open)} className="w-full bg-stone-900/60 border border-stone-700 rounded-lg p-4 flex items-center justify-between hover:bg-stone-900/80">
          <div className="flex items-center gap-2">
            <span className="text-2xl">⚙️</span>
            <span className="text-stone-200 font-bold">הגדרות מערכת</span>
          </div>
          <span className="text-stone-500">{open ? '−' : '+'}</span>
        </button>
        {open && (
          <div className="mt-3 space-y-6 bg-stone-900/40 border border-stone-800 rounded-lg p-4">
            {/* Auto-approve toggle */}
            <div className={`rounded-lg p-3 flex items-center justify-between gap-2 transition-colors ${autoApprove ? 'bg-lime-500/10 border border-lime-400/40' : 'bg-stone-900/60 border border-stone-700'}`}>
              <div>
                <div className="font-bold text-stone-200 text-sm">⚡ אישור אוטומטי</div>
                <div className="text-stone-500 text-xs">בקשות בלי התנגשות יאושרו לבד</div>
              </div>
              <button onClick={onToggleAutoApprove} className={`px-4 py-2 rounded-full font-black text-sm min-w-[90px] ${autoApprove ? 'bg-lime-400 text-stone-950' : 'bg-stone-700 text-stone-400'}`}>
                {autoApprove ? '🟢 פעיל' : '⚫ כבוי'}
              </button>
            </div>

            {/* Open registration toggle */}
            <div className={`rounded-lg p-3 flex items-center justify-between gap-2 transition-colors ${settings.open_registration ? 'bg-lime-500/10 border border-lime-400/40' : 'bg-stone-900/60 border border-stone-700'}`}>
              <div>
                <div className="font-bold text-stone-200 text-sm">🔓 רישום פתוח לאורחים</div>
                <div className="text-stone-500 text-xs">מאפשר הזמנה ללא חברות (כמו שהיה קודם)</div>
              </div>
              <button onClick={toggleOpenReg} className={`px-4 py-2 rounded-full font-black text-sm min-w-[90px] ${settings.open_registration ? 'bg-lime-400 text-stone-950' : 'bg-stone-700 text-stone-400'}`}>
                {settings.open_registration ? '🟢 פעיל' : '⚫ כבוי'}
              </button>
            </div>

            {/* Manual reset */}
            <div className="rounded-lg p-3 bg-stone-900/60 border border-stone-700 flex items-center justify-between gap-2">
              <div>
                <div className="font-bold text-stone-200 text-sm">🔄 איפוס ידני של הלוח</div>
                <div className="text-stone-500 text-xs">אוטומטי בכל פעם שמנהל נכנס בשבוע חדש</div>
              </div>
              <button onClick={onResetWeek} disabled={!hasGames} className="bg-red-900/30 hover:bg-red-900/50 border border-red-500/30 text-red-300 font-bold py-2 px-4 rounded text-sm disabled:opacity-40 disabled:cursor-not-allowed">
                איפוס לוח
              </button>
            </div>

            {/* Field name */}
            <div>
              <div className="text-lime-400 font-bold text-sm uppercase mb-2 tracking-wide">📍 שם המגרש</div>
              <div className="flex gap-2">
                <input className="flex-1 bg-stone-900/60 border-2 border-lime-500/20 focus:border-lime-400 text-stone-100 px-3 py-2 rounded outline-none" value={fieldInput} onChange={e => setFieldInput(e.target.value)} placeholder="לדוגמה: מגרש סינטטי" />
                <button onClick={saveField} className="bg-lime-400 hover:bg-lime-300 text-stone-950 font-bold px-4 rounded">שמור</button>
              </div>
              <p className="text-stone-500 text-xs mt-1">שם המגרש יוצמד אוטומטית לכל הזמנה</p>
            </div>

            {/* Teams list */}
            <div>
              <div className="text-lime-400 font-bold text-sm uppercase mb-2 tracking-wide">⚽ קבוצות (רשימה נפתחת בטופס)</div>
              <div className="space-y-2 mb-3">
                {(settings.teams || []).map(t => (
                  <div key={t} className="flex items-center justify-between bg-stone-900/60 border border-stone-700 rounded p-2">
                    <span className="text-stone-200">{t}</span>
                    <button onClick={() => removeTeam(t)} className="text-red-400 hover:text-red-300 text-sm font-bold px-2">✕</button>
                  </div>
                ))}
                {(!settings.teams || settings.teams.length === 0) && (
                  <p className="text-stone-500 text-xs">אין קבוצות. הוסף קבוצה למטה.</p>
                )}
              </div>
              <div className="flex gap-2">
                <input className="flex-1 bg-stone-900/60 border-2 border-lime-500/20 focus:border-lime-400 text-stone-100 px-3 py-2 rounded outline-none" value={newTeam} onChange={e => setNewTeam(e.target.value)} placeholder="שם קבוצה חדשה" onKeyDown={e => e.key === 'Enter' && addTeam()} />
                <button onClick={addTeam} className="bg-lime-400 hover:bg-lime-300 text-stone-950 font-bold px-4 rounded">+ הוסף</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  function ArchivedCard({ a, onDelete }) {
    const day = a.scheduled_day || a.preferred_day;
    const start = a.scheduled_time || a.preferred_time;
    const end = a.scheduled_end_time || a.preferred_end_time;
    const field = a.scheduled_field || a.preferred_field;
    return (
      <div className="bg-stone-900/40 border border-stone-700 rounded-lg p-3 opacity-80">
        <div className="flex items-start justify-between">
          <div>
            <h3 className="text-base font-bold text-stone-300">{a.team_name}</h3>
            <p className="text-stone-500 text-xs">{a.captain_name}</p>
            <p className="text-stone-400 text-xs mt-1">
              יום {day} • <span dir="ltr" className="font-num">{fmtTimeRange(start, end)}</span>
              {field ? ` • 📍 ${field}` : ''}
            </p>
          </div>
          <button onClick={() => onDelete(a.id)} className="text-stone-600 hover:text-red-400 px-2 text-sm" title="מחק לצמיתות">🗑️</button>
        </div>
      </div>
    );
  }

  function Section({ title, items, status, children }) {
    const [open, setOpen] = useState(status !== 'rejected');
    const st = STATUS_STYLES[status];
    return (
      <div className="mb-6">
        <button onClick={() => setOpen(!open)} className="w-full flex items-center justify-between mb-3 group">
          <div className="flex items-center gap-3">
            <h2 className="text-2xl font-black text-stone-100 font-display group-hover:text-lime-400 transition-colors">{title}</h2>
            <span className={`${st.bg} ${st.text} px-2.5 py-0.5 rounded-full text-sm font-black`}>{items.length}</span>
          </div>
          <span className="text-stone-500">{open ? '▲' : '▼'}</span>
        </button>
        {open && (
          items.length === 0 ? (
            <p className="text-stone-500 text-center py-6 border-2 border-dashed border-stone-800 rounded text-sm">אין כרגע</p>
          ) : (
            <div className="space-y-3">{children}</div>
          )
        )}
      </div>
    );
  }

  function PendingCard({ reg, onApprove, onReject }) {
    const rejectLink = buildWhatsAppRejectLink(reg);
    return (
      <div className="bg-blue-950/20 border border-blue-500/30 rounded-lg p-4">
        <div className="flex items-start justify-between mb-3">
          <div>
            <h3 className="text-xl font-black text-stone-100">{reg.team_name}</h3>
            <p className="text-stone-400 text-sm">{reg.captain_name}</p>
          </div>
          <span className="text-xs text-blue-300 bg-blue-950/50 px-2 py-1 rounded">ממתינה</span>
        </div>
        <div className="text-sm text-stone-300 space-y-1 mb-3">
          {reg.email && <div>📧 <span dir="ltr">{reg.email}</span></div>}
          {reg.phone && <div>📱 <span dir="ltr">{reg.phone}</span></div>}
          <div>🕐 מבקש: יום {reg.preferred_day} <span dir="ltr" className="font-num">{fmtTimeRange(reg.preferred_time, reg.preferred_end_time)}</span></div>
          {reg.preferred_field && <div>📍 {reg.preferred_field}</div>}
          {reg.players && <div>👥 {reg.players} שחקנים</div>}
          {reg.notes && <div className="bg-stone-900/60 rounded p-2 mt-2 text-stone-400 italic">"{reg.notes}"</div>}
        </div>
        <div className="flex gap-2">
          <button onClick={() => onApprove(reg)} className="flex-1 bg-lime-400 hover:bg-lime-300 text-stone-950 font-bold py-2 rounded active:scale-95 transition-all">✓ אשר</button>
          {rejectLink && <a href={rejectLink} target="_blank" rel="noopener" className="bg-stone-800 hover:bg-stone-700 text-stone-300 px-3 py-2 rounded text-sm flex items-center" title="שלח הודעה">💬</a>}
          <button onClick={() => onReject(reg)} className="bg-red-900/40 hover:bg-red-900/60 border border-red-500/30 text-red-300 px-3 py-2 rounded">✕</button>
        </div>
      </div>
    );
  }

  function ApprovedCard({ g, onEdit, onReject, onDelete }) {
    const waLink = buildWhatsAppApproveLink(g);
    const emailLink = buildEmailApproveLink(g);
    return (
      <div className="bg-stone-900/60 border-r-4 border-lime-400 rounded-lg p-4">
        <div className="flex items-start justify-between mb-2">
          <div>
            <h3 className="text-lg font-black text-stone-100">{g.team_name}</h3>
            <p className="text-lime-400 text-sm font-bold">
              יום {g.scheduled_day} • <span dir="ltr" className="font-num">{fmtTimeRange(g.scheduled_time, g.scheduled_end_time)}</span>
            </p>
            {g.scheduled_field && <p className="text-stone-400 text-sm">📍 {g.scheduled_field}</p>}
          </div>
          <div className="flex gap-1">
            <button onClick={() => onEdit(g)} className="text-stone-500 hover:text-lime-400 px-2 text-lg" title="ערוך">✏️</button>
            <button onClick={() => onReject(g)} className="text-stone-500 hover:text-red-400 px-2 text-lg" title="בטל">✕</button>
            <button onClick={() => onDelete(g.id)} className="text-stone-600 hover:text-red-400 px-2 text-lg" title="מחק לצמיתות">🗑️</button>
          </div>
        </div>
        {(waLink || emailLink) && (
          <div className="flex gap-2 mt-3">
            {waLink && <a href={waLink} target="_blank" rel="noopener" className="flex-1 bg-green-600 hover:bg-green-500 text-white font-bold py-2 rounded text-sm text-center">💬 וואטסאפ</a>}
            {emailLink && <a href={emailLink} className="flex-1 bg-stone-700 hover:bg-stone-600 text-stone-100 font-bold py-2 rounded text-sm text-center">📧 מייל</a>}
          </div>
        )}
      </div>
    );
  }

  function RejectedCard({ r, onApprove, onDelete }) {
    return (
      <div className="bg-red-950/20 border border-red-500/30 rounded-lg p-4">
        <div className="flex items-start justify-between mb-2">
          <div>
            <h3 className="text-lg font-black text-stone-100">{r.team_name}</h3>
            <p className="text-stone-400 text-sm">{r.captain_name}{r.phone ? <> • <span dir="ltr">{r.phone}</span></> : ''}</p>
            <p className="text-red-300/80 text-sm mt-1">
              ביקש: יום {r.preferred_day} <span dir="ltr" className="font-num">{fmtTimeRange(r.preferred_time, r.preferred_end_time)}</span>
            </p>
          </div>
          <div className="flex gap-1">
            <button onClick={() => onApprove(r)} className="text-lime-400 hover:text-lime-300 px-2 text-lg" title="אשר בכל זאת">↩️</button>
