<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ליגת המגרש</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Karantina:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body {
    background: #0c0c0a;
    font-family: 'Heebo', sans-serif;
    color: #f5f5f4;
    min-height: 100vh;
  }
  .font-display { font-family: 'Karantina', serif; }
  .font-num { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.05em; }
  .pitch-bg {
    background-image:
      linear-gradient(0deg, transparent 49.5%, rgba(163,230,53,0.04) 49.5%, rgba(163,230,53,0.04) 50.5%, transparent 50.5%),
      linear-gradient(90deg, transparent 49.5%, rgba(163,230,53,0.04) 49.5%, rgba(163,230,53,0.04) 50.5%, transparent 50.5%);
    background-size: 80px 80px;
  }
  @keyframes slideDown { from { transform: translate(-50%, -100%); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
  .toast { animation: slideDown 0.3s ease-out; }
  input, select, textarea { font-family: inherit; }
</style>
</head>
<body class="pitch-bg">
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect } = React;

  // ============================================
  // CONFIG
  // ============================================
  const SUPABASE_URL = 'https://xbrrxdxxfsmxllgtnoep.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_P_DvnAuIfEx8SKuhR4tgGA_K4k5nK57';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const DAYS = ['ראשון', 'שני', 'שלישי', 'רביעי', 'חמישי', 'שישי', 'שבת'];

  // ============================================
  // HELPERS
  // ============================================
  function formatPhoneForWhatsApp(phone) {
    let digits = (phone || '').replace(/\D/g, '');
    if (digits.startsWith('0')) digits = '972' + digits.slice(1);
    if (!digits.startsWith('972') && digits.length >= 9) digits = '972' + digits;
    return digits;
  }

  function buildWhatsAppApproveLink(reg) {
    const phone = formatPhoneForWhatsApp(reg.phone);
    const msg = `שלום ${reg.captain_name}! 👋\n\nההרשמה של *${reg.team_name}* אושרה ⚽\n\n📅 יום ${reg.scheduled_day}\n🕐 שעה ${reg.scheduled_time}\n\nנתראה במגרש!`;
    return `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
  }

  function buildEmailApproveLink(reg) {
    const subject = `אישור הרשמה - ${reg.team_name}`;
    const body = `שלום ${reg.captain_name},\n\nההרשמה של ${reg.team_name} אושרה!\n\nפרטי המשחק:\n• יום ${reg.scheduled_day}\n• שעה ${reg.scheduled_time}\n\nנתראה במגרש!`;
    return `mailto:${reg.email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  }

  function buildWhatsAppRejectLink(reg) {
    const phone = formatPhoneForWhatsApp(reg.phone);
    const msg = `שלום ${reg.captain_name}, לצערנו לא נוכל לקלוט את ${reg.team_name} בזמן המבוקש. נשמח לתאם זמן אחר 🙏`;
    return `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
  }

  // ============================================
  // MAIN APP
  // ============================================
  function App() {
    const [view, setView] = useState('home');
    const [user, setUser] = useState(null);
    const [registrations, setRegistrations] = useState([]);
    const [loading, setLoading] = useState(true);
    const [toast, setToast] = useState(null);
    const [approvalDialog, setApprovalDialog] = useState(null);

    // Auth state
    useEffect(() => {
      supabase.auth.getSession().then(({ data }) => {
        setUser(data.session?.user || null);
      });
      const { data: sub } = supabase.auth.onAuthStateChange((_event, session) => {
        setUser(session?.user || null);
      });
      return () => sub.subscription.unsubscribe();
    }, []);

    // Load data
    useEffect(() => { loadData(); }, []);

    async function loadData() {
      setLoading(true);
      const { data, error } = await supabase
        .from('registrations')
        .select('*')
        .order('created_at', { ascending: true });
      if (error) {
        showToast('שגיאה בטעינת הנתונים', 'error');
      } else {
        setRegistrations(data || []);
      }
      setLoading(false);
    }

    const showToast = (msg, type = 'success') => {
      setToast({ msg, type });
      setTimeout(() => setToast(null), 3500);
    };

    const pending = registrations.filter(r => r.status === 'pending');
    const approved = registrations.filter(r => r.status === 'approved');

    // ============================================
    // ACTIONS
    // ============================================
    async function submitRegistration(form) {
      const { error } = await supabase.from('registrations').insert([{
        team_name: form.team_name,
        captain_name: form.captain_name,
        email: form.email,
        phone: form.phone,
        preferred_day: form.preferred_day,
        preferred_time: form.preferred_time,
        players: form.players ? parseInt(form.players) : null,
        notes: form.notes || null,
        status: 'pending'
      }]);
      if (error) {
        showToast('שגיאה בשליחה: ' + error.message, 'error');
        return false;
      }
      await loadData();
      showToast('ההרשמה נשלחה לאישור! נחזור אליך בקרוב 🎉');
      setView('home');
      return true;
    }

    async function approveRegistration(reg, day, time) {
      const { error } = await supabase
        .from('registrations')
        .update({
          status: 'approved',
          scheduled_day: day,
          scheduled_time: time,
          approved_at: new Date().toISOString()
        })
        .eq('id', reg.id);
      if (error) {
        showToast('שגיאה: ' + error.message, 'error');
        return;
      }
      await loadData();
      setApprovalDialog(null);
      showToast(`${reg.team_name} אושרה! 🎉`);
    }

    async function rejectRegistration(reg) {
      if (!confirm(`לדחות את ההרשמה של ${reg.team_name}?`)) return;
      const { error } = await supabase
        .from('registrations')
        .update({ status: 'rejected' })
        .eq('id', reg.id);
      if (error) {
        showToast('שגיאה: ' + error.message, 'error');
        return;
      }
      await loadData();
      showToast('ההרשמה נדחתה');
    }

    async function deleteApproved(id) {
      if (!confirm('להסיר משחק מהלוח?')) return;
      const { error } = await supabase
        .from('registrations')
        .delete()
        .eq('id', id);
      if (error) {
        showToast('שגיאה: ' + error.message, 'error');
        return;
      }
      await loadData();
      showToast('המשחק הוסר');
    }

    async function login(email, password) {
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) return error.message;
      await loadData();
      setView('admin');
      return null;
    }

    async function logout() {
      await supabase.auth.signOut();
      setView('home');
      showToast('יצאת בהצלחה');
    }

    // ============================================
    // RENDER
    // ============================================
    if (loading && registrations.length === 0) {
      return (
        <div className="min-h-screen flex items-center justify-center">
          <div className="text-lime-400 text-xl animate-pulse">טוען...</div>
        </div>
      );
    }

    return (
      <div className="min-h-screen relative">
        {toast && (
          <div className={`toast fixed top-4 left-1/2 -translate-x-1/2 z-50 px-4 py-3 rounded-lg shadow-2xl font-bold max-w-sm text-center ${
            toast.type === 'error' ? 'bg-red-500 text-white' : 'bg-lime-400 text-stone-950'
          }`}>
            {toast.msg}
          </div>
        )}

        {approvalDialog && (
          <ApprovalDialog
            reg={approvalDialog}
            onClose={() => setApprovalDialog(null)}
            onApprove={approveRegistration}
          />
        )}

        <Header user={user} onHome={() => setView('home')} onAdmin={() => setView(user ? 'admin' : 'adminLogin')} onLogout={logout} />

        <main className="max-w-4xl mx-auto">
          {view === 'home' && (
            <Home approved={approved} onRegister={() => setView('register')} />
          )}
          {view === 'register' && (
            <RegisterForm onBack={() => setView('home')} onSubmit={submitRegistration} />
          )}
          {view === 'adminLogin' && (
            <AdminLogin onBack={() => setView('home')} onLogin={login} />
          )}
          {view === 'admin' && user && (
            <AdminPanel
              pending={pending}
              approved={approved}
              onApprove={(reg) => setApprovalDialog(reg)}
              onReject={rejectRegistration}
              onDelete={deleteApproved}
            />
          )}
        </main>

        <footer className="border-t border-stone-800 mt-16 py-6 text-center text-xs text-stone-600">
          ⚽ ליגת המגרש
        </footer>
      </div>
    );
  }

  // ============================================
  // COMPONENTS
  // ============================================
  function Header({ user, onHome, onAdmin, onLogout }) {
    return (
      <header className="border-b border-lime-500/10">
        <div className="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
          <div onClick={onHome} className="cursor-pointer flex items-center gap-2">
            <div className="w-9 h-9 rounded-full bg-lime-400 flex items-center justify-center text-stone-950 text-xl">⚽</div>
            <div>
              <h1 className="text-2xl font-black leading-none font-display text-stone-100">ליגת המגרש</h1>
              <p className="text-[10px] text-lime-400 uppercase tracking-widest">FOOTBALL LEAGUE</p>
            </div>
          </div>
          {user ? (
            <button onClick={onLogout} className="text-stone-400 hover:text-red-400 text-sm">
              🚪 יציאה
            </button>
          ) : (
            <button onClick={onAdmin} className="text-stone-500 hover:text-lime-400 text-sm">
              🛡️ מנהלים
            </button>
          )}
        </div>
      </header>
    );
  }

  function Home({ approved, onRegister }) {
    const grouped = {};
    approved.forEach(g => {
      const key = `${g.scheduled_day}-${g.scheduled_time}`;
      if (!grouped[key]) grouped[key] = { day: g.scheduled_day, time: g.scheduled_time, teams: [] };
      grouped[key].teams.push(g);
    });
    const sorted = Object.values(grouped).sort((a, b) => {
      const dayDiff = DAYS.indexOf(a.day) - DAYS.indexOf(b.day);
      if (dayDiff !== 0) return dayDiff;
      return (a.time || '').localeCompare(b.time || '');
    });

    return (
      <div className="px-4 py-8">
        <div className="text-center py-8 mb-8 border-y border-lime-500/10">
          <div className="text-xs text-lime-400 uppercase tracking-[0.3em] mb-2">לוח שבועי רשמי</div>
          <h1 className="text-6xl md:text-8xl font-black text-stone-100 leading-[0.9] font-display">המגרש שלנו</h1>
          <h2 className="text-6xl md:text-8xl font-black text-lime-400 leading-[0.9] font-display">המשחק שלך</h2>
          <p className="text-stone-400 mt-4 max-w-md mx-auto">
            הירשם, קבל אישור ממנהל המגרש, ותפוס את הזמן שלך השבוע
          </p>
          <button
            onClick={onRegister}
            className="mt-6 inline-flex items-center gap-2 bg-lime-400 hover:bg-lime-300 text-stone-950 font-black px-8 py-4 rounded-md uppercase tracking-wider shadow-xl shadow-lime-400/20 active:scale-95 transition-all font-display text-2xl"
          >
            ➕ הירשם עכשיו
          </button>
        </div>

        <div>
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-3xl font-black text-stone-100 font-display">הלוח השבועי</h2>
            <div className="text-xs text-stone-500 uppercase tracking-wider">{approved.length} משחקים</div>
          </div>
          <div className="space-y-4">
            {sorted.length === 0 ? (
              <div className="text-center py-16 border-2 border-dashed border-stone-800 rounded-lg">
                <div className="text-5xl mb-3">📅</div>
                <p className="text-stone-500">אין משחקים מתוזמנים השבוע</p>
                <p className="text-stone-600 text-sm mt-1">היה הראשון להירשם!</p>
              </div>
            ) : (
              sorted.map(slot => (
                <div key={`${slot.day}-${slot.time}`} className="bg-gradient-to-l from-stone-900 to-stone-900/40 border-r-4 border-lime-400 rounded-lg overflow-hidden">
                  <div className="px-4 py-3 bg-stone-900/80 flex items-center justify-between">
                    <span className="text-2xl font-black text-lime-400 font-display">יום {slot.day}</span>
                    <span className="text-xl font-bold text-stone-100 font-num" dir="ltr">{slot.time}</span>
                  </div>
                  <div className="p-3 space-y-2">
                    {slot.teams.map(t => (
                      <div key={t.id} className="bg-stone-950/60 px-3 py-2 rounded flex items-center gap-2">
                        <span className="w-2 h-2 rounded-full bg-lime-400" />
                        <span className="font-bold text-stone-100">{t.team_name}</span>
                        {t.captain_name && <span className="text-stone-500 text-sm">• {t.captain_name}</span>}
                      </div>
                    ))}
                    {slot.teams.length >= 2 && (
                      <div className="text-center text-xs text-lime-400/60 pt-1">
                        {slot.teams.length} קבוצות במגרש
                      </div>
                    )}
                  </div>
                </div>
              ))
            )}
          </div>
        </div>
      </div>
    );
  }

  function RegisterForm({ onBack, onSubmit }) {
    const [form, setForm] = useState({
      team_name: '', captain_name: '', email: '', phone: '',
      preferred_day: '', preferred_time: '', players: '', notes: ''
    });
    const [errors, setErrors] = useState({});
    const [submitting, setSubmitting] = useState(false);

    const submit = async () => {
      const errs = {};
      if (!form.team_name.trim()) errs.team_name = 'חובה';
      if (!form.captain_name.trim()) errs.captain_name = 'חובה';
      if (!form.email.trim() || !form.email.includes('@')) errs.email = 'מייל לא תקין';
      if (!form.phone.trim() || form.phone.replace(/\D/g, '').length < 9) errs.phone = 'טלפון לא תקין';
      if (!form.preferred_day) errs.preferred_day = 'חובה';
      if (!form.preferred_time) errs.preferred_time = 'חובה';
      setErrors(errs);
      if (Object.keys(errs).length) return;
      setSubmitting(true);
      await onSubmit(form);
      setSubmitting(false);
    };

    const inputCls = "w-full bg-stone-900/60 border-2 border-lime-500/20 focus:border-lime-400 text-stone-100 px-4 py-3 rounded-md outline-none transition-colors text-base placeholder-stone-500";
    const labelCls = "block text-lime-400 mb-2 font-bold text-sm tracking-wide uppercase";

    return (
      <div className="max-w-xl mx-auto px-4 py-8">
        <button onClick={onBack} className="text-stone-400 mb-6 hover:text-lime-400">← חזרה</button>
        <h1 className="text-5xl md:text-6xl font-black mb-2 font-display text-lime-400">הרשמת קבוצה</h1>
        <p className="text-stone-400 mb-8">מלא את הפרטים ומנהל המגרש יאשר אותך</p>

        <div className="space-y-5">
          <div>
            <label className={labelCls}>שם הקבוצה</label>
            <input className={inputCls} value={form.team_name} onChange={e => setForm({...form, team_name: e.target.value})} placeholder="הברזילאים" />
            {errors.team_name && <p className="text-red-400 text-sm mt-1">{errors.team_name}</p>}
          </div>
          <div>
            <label className={labelCls}>שם הקפטן</label>
            <input className={inputCls} value={form.captain_name} onChange={e => setForm({...form, captain_name: e.target.value})} placeholder="ישראל ישראלי" />
            {errors.captain_name && <p className="text-red-400 text-sm mt-1">{errors.captain_name}</p>}
          </div>
          <div>
            <label className={labelCls}>📧 מייל</label>
            <input type="email" className={inputCls} value={form.email} onChange={e => setForm({...form, email: e.target.value})} placeholder="captain@team.com" dir="ltr" />
            {errors.email && <p className="text-red-400 text-sm mt-1">{errors.email}</p>}
          </div>
          <div>
            <label className={labelCls}>📱 וואטסאפ</label>
            <input type="tel" className={inputCls} value={form.phone} onChange={e => setForm({...form, phone: e.target.value})} placeholder="050-1234567" dir="ltr" />
            {errors.phone && <p className="text-red-400 text-sm mt-1">{errors.phone}</p>}
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className={labelCls}>יום מועדף</label>
              <select className={inputCls} value={form.preferred_day} onChange={e => setForm({...form, preferred_day: e.target.value})}>
                <option value="">בחר יום</option>
                {DAYS.map(d => <option key={d} value={d}>{d}</option>)}
              </select>
              {errors.preferred_day && <p className="text-red-400 text-sm mt-1">{errors.preferred_day}</p>}
            </div>
            <div>
              <label className={labelCls}>שעה</label>
              <input type="time" className={inputCls} value={form.preferred_time} onChange={e => setForm({...form, preferred_time: e.target.value})} dir="ltr" />
              {errors.preferred_time && <p className="text-red-400 text-sm mt-1">{errors.preferred_time}</p>}
            </div>
          </div>
          <div>
            <label className={labelCls}>מספר שחקנים (אופציונלי)</label>
            <input type="number" className={inputCls} value={form.players} onChange={e => setForm({...form, players: e.target.value})} placeholder="11" />
          </div>
          <div>
            <label className={labelCls}>הערות (אופציונלי)</label>
            <textarea className={inputCls} value={form.notes} onChange={e => setForm({...form, notes: e.target.value})} rows={3} placeholder="משהו שכדאי שנדע..." />
          </div>
          <button
            onClick={submit}
            disabled={submitting}
            className="w-full bg-lime-400 hover:bg-lime-300 text-stone-950 font-black py-4 rounded-md text-lg uppercase tracking-wider transition-all shadow-lg shadow-lime-400/30 active:scale-[0.98] font-display disabled:opacity-50"
          >
            {submitting ? 'שולח...' : 'שלח הרשמה ⚽'}
          </button>
        </div>
      </div>
    );
  }

  function AdminLogin({ onBack, onLogin }) {
    const [email, setEmail] = useState('');
    const [password, setPassword] = useState('');
    const [error, setError] = useState('');
    const [loading, setLoading] = useState(false);

    const handleLogin = async () => {
      if (!email || !password) {
        setError('מלא את כל השדות');
        return;
      }
      setLoading(true);
      setError('');
      const err = await onLogin(email, password);
      if (err) setError('פרטי התחברות שגויים');
      setLoading(false);
    };

    return (
      <div className="max-w-sm mx-auto px-4 py-12">
        <button onClick={onBack} className="text-stone-400 mb-6 hover:text-lime-400">← חזרה</button>
        <div className="bg-stone-900/60 border border-lime-500/20 rounded-lg p-6">
          <div className="text-5xl mb-3">🛡️</div>
          <h2 className="text-3xl font-black text-stone-100 mb-2 font-display">כניסת מנהלים</h2>
          <p className="text-stone-400 text-sm mb-5">הזן מייל וסיסמה כדי לאשר הרשמות</p>
          <input
            type="email"
            className="w-full bg-stone-950 border-2 border-lime-500/20 focus:border-lime-400 text-stone-100 px-4 py-3 rounded outline-none mb-3"
            placeholder="מייל"
            value={email}
            onChange={e => { setEmail(e.target.value); setError(''); }}
            dir="ltr"
          />
          <input
            type="password"
            className="w-full bg-stone-950 border-2 border-lime-500/20 focus:border-lime-400 text-stone-100 px-4 py-3 rounded outline-none mb-3"
            placeholder="סיסמה"
            value={password}
            onChange={e => { setPassword(e.target.value); setError(''); }}
            onKeyDown={e => e.key === 'Enter' && handleLogin()}
            dir="ltr"
          />
          {error && <p className="text-red-400 text-sm mb-3">{error}</p>}
          <button
            onClick={handleLogin}
            disabled={loading}
            className="w-full bg-lime-400 text-stone-950 font-black py-3 rounded uppercase tracking-wider font-display disabled:opacity-50"
          >
            {loading ? 'מתחבר...' : 'כניסה'}
          </button>
        </div>
      </div>
    );
  }

  function AdminPanel({ pending, approved, onApprove, onReject, onDelete }) {
    return (
      <div className="px-4 py-8">
        <h1 className="text-5xl font-black text-stone-100 mb-1 font-display">פאנל ניהול</h1>
        <p className="text-stone-500 mb-8 text-sm">אשר הרשמות ושלח התראות לקבוצות</p>

        <div className="mb-8">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-3xl font-black text-lime-400 font-display">ממתינות לאישור</h2>
            <span className="bg-lime-400 text-stone-950 px-3 py-1 rounded-full text-sm font-black">{pending.length}</span>
          </div>
          {pending.length === 0 ? (
            <p className="text-stone-500 text-center py-8 border-2 border-dashed border-stone-800 rounded">אין הרשמות ממתינות</p>
          ) : (
            <div className="space-y-3">
              {pending.map(reg => (
                <div key={reg.id} className="bg-amber-950/20 border border-amber-500/30 rounded-lg p-4">
                  <div className="flex items-start justify-between mb-3">
                    <div>
                      <h3 className="text-xl font-black text-stone-100">{reg.team_name}</h3>
                      <p className="text-stone-400 text-sm">{reg.captain_name}</p>
                    </div>
                    <span className="text-xs text-amber-400 bg-amber-950/50 px-2 py-1 rounded">ממתינה</span>
                  </div>
                  <div className="text-sm text-stone-300 space-y-1 mb-3">
                    <div>📧 <span dir="ltr">{reg.email}</span></div>
                    <div>📱 <span dir="ltr">{reg.phone}</span></div>
                    <div>🕐 מבקש: יום {reg.preferred_day} ב-{reg.preferred_time}</div>
                    {reg.players && <div>👥 {reg.players} שחקנים</div>}
                    {reg.notes && <div className="bg-stone-900/60 rounded p-2 mt-2 text-stone-400 italic">"{reg.notes}"</div>}
                  </div>
                  <div className="flex gap-2">
                    <button
                      onClick={() => onApprove(reg)}
                      className="flex-1 bg-lime-400 hover:bg-lime-300 text-stone-950 font-bold py-2 rounded active:scale-95 transition-all"
                    >
                      ✓ אשר
                    </button>
                    <a
                      href={buildWhatsAppRejectLink(reg)}
                      target="_blank"
                      rel="noopener"
                      className="bg-stone-800 hover:bg-stone-700 text-stone-300 px-3 py-2 rounded text-sm flex items-center"
                      title="שלח הודעה למבקש"
                    >
                      💬
                    </a>
                    <button
                      onClick={() => onReject(reg)}
                      className="bg-red-900/40 hover:bg-red-900/60 border border-red-500/30 text-red-300 px-3 py-2 rounded"
                    >
                      ✕
                    </button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        <div>
          <h2 className="text-3xl font-black text-stone-200 mb-4 font-display">משחקים מאושרים</h2>
          {approved.length === 0 ? (
            <p className="text-stone-500 text-center py-8 border-2 border-dashed border-stone-800 rounded">אין משחקים מאושרים</p>
          ) : (
            <div className="space-y-3">
              {approved.map(g => (
                <div key={g.id} className="bg-stone-900/60 border-r-4 border-lime-400 rounded-lg p-4">
                  <div className="flex items-start justify-between mb-2">
                    <div>
                      <h3 className="text-lg font-black text-stone-100">{g.team_name}</h3>
                      <p className="text-lime-400 text-sm font-bold">יום {g.scheduled_day} • {g.scheduled_time}</p>
                    </div>
                    <button onClick={() => onDelete(g.id)} className="text-stone-600 hover:text-red-400">🗑️</button>
                  </div>
                  <div className="flex gap-2 mt-3">
                    <a
                      href={buildWhatsAppApproveLink(g)}
                      target="_blank"
                      rel="noopener"
                      className="flex-1 bg-green-600 hover:bg-green-500 text-white font-bold py-2 rounded text-sm text-center"
                    >
                      💬 וואטסאפ
                    </a>
                    <a
                      href={buildEmailApproveLink(g)}
                      className="flex-1 bg-stone-700 hover:bg-stone-600 text-stone-100 font-bold py-2 rounded text-sm text-center"
                    >
                      📧 מייל
                    </a>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  }

  function ApprovalDialog({ reg, onClose, onApprove }) {
    const [day, setDay] = useState(reg.preferred_day || '');
    const [time, setTime] = useState(reg.preferred_time || '');

    return (
      <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-end md:items-center justify-center p-4">
        <div className="bg-stone-900 border border-lime-500/30 rounded-t-2xl md:rounded-2xl w-full max-w-md p-6">
          <h3 className="text-2xl font-black text-lime-400 mb-1 font-display">אישור: {reg.team_name}</h3>
          <p className="text-stone-400 text-sm mb-5">קבע את היום והשעה הסופיים</p>

          <label className="block text-lime-400 mb-2 font-bold text-sm uppercase">יום</label>
          <select
            className="w-full bg-stone-950 border-2 border-lime-500/20 focus:border-lime-400 text-stone-100 px-4 py-3 rounded outline-none mb-4"
            value={day}
            onChange={e => setDay(e.target.value)}
          >
            <option value="">בחר יום</option>
            {DAYS.map(d => <option key={d} value={d}>{d}</option>)}
          </select>

          <label className="block text-lime-400 mb-2 font-bold text-sm uppercase">שעה</label>
          <input
            type="time"
            className="w-full bg-stone-950 border-2 border-lime-500/20 focus:border-lime-400 text-stone-100 px-4 py-3 rounded outline-none mb-6"
            value={time}
            onChange={e => setTime(e.target.value)}
            dir="ltr"
          />

          <div className="flex gap-2">
            <button onClick={onClose} className="flex-1 bg-stone-800 text-stone-300 font-bold py-3 rounded">ביטול</button>
            <button
              onClick={() => {
                if (!day || !time) { alert('בחר יום ושעה'); return; }
                onApprove(reg, day, time);
              }}
              className="flex-1 bg-lime-400 text-stone-950 font-black py-3 rounded"
            >
              אשר ✓
            </button>
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
